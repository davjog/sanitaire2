  const [form, setForm] = useState(emptyForm);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [search, setSearch] = useState("");
  const [detailId, setDetailId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [toast, setToast] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [lastSaved, setLastSaved] = useState(null);
  const [showPrint, setShowPrint] = useState(false);
  const [showStats, setShowStats] = useState(false);

  const showToast = (msg, type = "success") => setToast({ msg, type });

  const filtered = useMemo(() =>
    records.filter(r => Object.values(r).some(v => v?.toString().toLowerCase().includes(search.toLowerCase())))
  , [records, search]);

  const handleChange = e => setForm(f => ({ ...f, [e.target.name]: e.target.value }));
  const handleVacheSelect = vList => setForm(f => ({ ...f, selectedVaches: vList }));
  const handleMedicamentSelect = m => setForm(f => ({
    ...f,
    medicament: m.nom,
    joursAttenteL: m.lait !== "" ? String(m.lait) : f.joursAttenteL,
    joursAttenteV: m.viande !== "" ? String(m.viande) : f.joursAttenteV,
  }));

  const handleSubmit = () => {
    const vachesList = form.selectedVaches && form.selectedVaches.length > 0 ? form.selectedVaches : (form.nomVache ? [{ nom: form.nomVache, numero: form.numeroVache, travail: form.travailVache }] : []);
    if (vachesList.length === 0 || !form.dateDebut) return;
    if (editId !== null) {
      // En mode édition : une seule vache
      const v = vachesList[0];
      setRecords(rs => rs.map(r => r.id === editId ? { ...form, nomVache: v.nom, numeroVache: v.numero, travailVache: v.travail, id: editId } : r));
      setEditId(null);
    } else {
      // Nouveau traitement : un enregistrement par vache
      const newRecords = vachesList.map(v => ({ ...form, nomVache: v.nom, numeroVache: v.numero, travailVache: v.travail, id: Date.now() + Math.random() }));
      setRecords(rs => [...rs, ...newRecords]);
    }
    setForm(emptyForm);
    setShowForm(false);
  };

  const handleEdit = record => { setForm({ ...record, selectedVaches: [{ nom: record.nomVache, numero: record.numeroVache, travail: record.travailVache }] }); setEditId(record.id); setShowForm(true); setDetailId(null); };
  const handleDelete = id => { setRecords(rs => rs.filter(r => r.id !== id)); setConfirmDelete(null); setDetailId(null); };

  // ── localStorage : chargement au démarrage ──
  const isFirstRender = useRef(true);
  const isLoading = useRef(true);
  const photoInputRef = useRef(null);
  useEffect(() => {
    try {
      const saved = localStorage.getItem("carnet-sanitaire-records");
      if (saved) {
        const parsed = JSON.parse(saved);
        if (Array.isArray(parsed) && parsed.length > 0) {
          setRecords(parsed);
          setLastSaved(localStorage.getItem("carnet-sanitaire-savedAt") || null);
        }
      }
      const savedVaches = localStorage.getItem("carnet-sanitaire-vaches");
      if (savedVaches) {
        const parsedV = JSON.parse(savedVaches);
        if (Array.isArray(parsedV) && parsedV.length > 0) setVaches(parsedV);
      }
    } catch(e) {}
    // On marque que le chargement est terminé après le prochain rendu
    setTimeout(() => { isLoading.current = false; }, 100);
  }, []);

  // ── localStorage : sauvegarde automatique à chaque changement ──
  useEffect(() => {
    if (isLoading.current) return; // Ne pas sauvegarder pendant le chargement
    try {
      const now = new Date().toISOString();
      localStorage.setItem("carnet-sanitaire-records", JSON.stringify(records));
      localStorage.setItem("carnet-sanitaire-savedAt", now);
      setLastSaved(now);
    } catch(e) {}
  }, [records]);

  useEffect(() => {
    if (isLoading.current) return;
    try { localStorage.setItem("carnet-sanitaire-vaches", JSON.stringify(vaches)); } catch(e) {}
  }, [vaches]);

  // ── GitHub : config ──
  const GITHUB_USER = "davjog";
  const GITHUB_REPO = "sanitaire2";
  const GITHUB_FILE = "data.json";
  const [githubLoading, setGithubLoading] = useState(false);
  const [showTokenModal, setShowTokenModal] = useState(false);
  const [pendingGithubAction, setPendingGithubAction] = useState(null); // "save" | "restore"

  const getToken = () => localStorage.getItem("carnet-github-token") || "";

  const githubAction = (action) => {
    if (!getToken()) { setPendingGithubAction(action); setShowTokenModal(true); }
    else { action === "save" ? saveToGithub() : restoreFromGithub(); }
  };

  const saveToGithub = async (token) => {
    const tok = token || getToken();
    if (!tok) { setShowTokenModal(true); setPendingGithubAction("save"); return; }
    setGithubLoading(true);
    showToast("Sauvegarde GitHub en cours…", "loading");
    try {
      const content = btoa(unescape(encodeURIComponent(JSON.stringify({ version: 1, savedAt: new Date().toISOString(), records }, null, 2))));
      let sha = "";
      try {
        const getRes = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
          headers: { Authorization: `token ${tok}`, Accept: "application/vnd.github.v3+json" }
        });
        if (getRes.ok) { const d = await getRes.json(); sha = d.sha; }
      } catch(e) {}
      const body = { message: `Sauvegarde carnet sanitaire ${new Date().toLocaleDateString("fr-FR")}`, content, ...(sha ? { sha } : {}) };
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
        method: "PUT",
        headers: { Authorization: `token ${tok}`, Accept: "application/vnd.github.v3+json", "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (res.status === 401) { localStorage.removeItem("carnet-github-token"); throw new Error("Token invalide — veuillez en créer un nouveau"); }
      if (!res.ok) throw new Error("Erreur " + res.status);
      showToast("✓ Sauvegardé sur GitHub", "success");
    } catch(e) {
      showToast("Erreur GitHub : " + e.message, "error");
    } finally { setGithubLoading(false); }
  };

  const restoreFromGithub = async (token) => {
    const tok = token || getToken();
    if (!tok) { setShowTokenModal(true); setPendingGithubAction("restore"); return; }
    setGithubLoading(true);
    showToast("Restauration GitHub en cours…", "loading");
    try {
      const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`, {
        headers: { Authorization: `token ${tok}`, Accept: "application/vnd.github.v3+json" }
      });
      if (res.status === 401) { localStorage.removeItem("carnet-github-token"); throw new Error("Token invalide — veuillez en créer un nouveau"); }
      if (!res.ok) throw new Error("Fichier introuvable");
      const d = await res.json();
      const text = decodeURIComponent(escape(atob(d.content)));
      const parsed = JSON.parse(text);
      if (parsed.records) {
        setRecords(parsed.records);
        showToast(`✓ ${parsed.records.length} traitement(s) restauré(s) depuis GitHub`, "success");
      } else throw new Error("Format invalide");
    } catch(e) {
      showToast("Erreur GitHub : " + e.message, "error");
    } finally { setGithubLoading(false); }
  };

  // ── Calcul des alertes délais ──
  const alertes = useMemo(() => {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const result = [];
    records.forEach(r => {
      const dL = getDateAttenteL(r);
      const dV = getDateAttenteV(r);
      [
        { d: dL, type: "LAIT", icon: "🥛", color: "#1565c0", moment: r.momentAttenteL || "matin" },
        { d: dV, type: "VIANDE", icon: "🥩", color: "#b71c1c", moment: r.momentAttenteV || "matin" },
      ].forEach(({ d, type, icon, color, moment }) => {
        if (!d) return;
        const date = new Date(d); date.setHours(0, 0, 0, 0);
        const diff = Math.round((date - today) / 86400000);
        if (diff === 0)
          result.push({ id: r.id, vache: r.nomVache, type, icon, color, moment, quand: "aujourd'hui", urgence: "high", date: d, diff });
        else if (diff === 1)
          result.push({ id: r.id, vache: r.nomVache, type, icon, color, moment, quand: "demain", urgence: "med", date: d, diff });
        else if (diff > 0 && diff <= 3)
          result.push({ id: r.id, vache: r.nomVache, type, icon, color, moment, quand: `dans ${diff} j`, urgence: "low", date: d, diff });
      });
    });
    return result.sort((a, b) => a.diff - b.diff || a.vache.localeCompare(b.vache));
  }, [records]);

  // ── Notifications navigateur ──
  const [notifPermission, setNotifPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "denied");
  const notifiedRef = useRef(new Set());

  const requestNotifPermission = async () => {
    if (typeof Notification === "undefined") return;
    const perm = await Notification.requestPermission();
    setNotifPermission(perm);
  };

  useEffect(() => {
    if (notifPermission !== "granted") return;
    alertes.forEach(a => {
      const key = `${a.id}-${a.type}-${a.date}`;
      if (notifiedRef.current.has(key)) return;
      if (a.urgence === "high" || a.urgence === "med") {
        const momentEmoji = a.moment === "matin" ? "🌅" : "🌆";
        const title = a.urgence === "high"
          ? `🚨 Délai ${a.type} expire AUJOURD'HUI`
          : `⚠️ Délai ${a.type} expire DEMAIN`;
        new Notification(title, {
          body: `🐄 ${a.vache} — Fin d'attente ${a.type} : ${formatDateAvecJour(a.date)} ${momentEmoji} ${a.moment}\n${a.urgence === "high" ? "Ne pas collecter le lait !" : "Préparez-vous pour demain."}`,
          icon: "https://cdn.jsdelivr.net/npm/twemoji@14/assets/72x72/1f404.png",
          tag: key,
        });
        notifiedRef.current.add(key);
      }
    });
  }, [alertes, notifPermission]);

  const [showAlertes, setShowAlertes] = useState(false);

  const detail = records.find(r => r.id === detailId);

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f0", fontFamily: "'Georgia','Times New Roman',serif" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}
      {showPrint && <PrintModal records={records} onClose={() => setShowPrint(false)} />}
      {showStats && <StatsModal records={records} onClose={() => setShowStats(false)} />}
      {showTokenModal && (
        <TokenModal
          onClose={() => { setShowTokenModal(false); setPendingGithubAction(null); }}
          onConfirm={tok => {
            localStorage.setItem("carnet-github-token", tok);
            setShowTokenModal(false);
            if (pendingGithubAction === "save") saveToGithub(tok);
            else if (pendingGithubAction === "restore") restoreFromGithub(tok);
            setPendingGithubAction(null);
          }}
        />
      )}}

      <MenuPanel
        open={showMenu}
        onClose={() => setShowMenu(false)}
        vaches={vaches}
        records={records}
        lastSaved={lastSaved}
        githubLoading={githubLoading}
        onGithubSave={() => { githubAction("save"); setShowMenu(false); }}
        onGithubRestore={() => { githubAction("restore"); setShowMenu(false); }}
        onPrint={() => setShowPrint(true)}
        onStats={() => setShowStats(true)}
        onImportVaches={newVaches => {
          setVaches(newVaches.sort((a, b) => a.nom.localeCompare(b.nom)));
          showToast(`✓ ${newVaches.length} vaches importées`, "success");
        }}
        onImportSauvegarde={newRecords => {
          setRecords(newRecords);
          showToast(`✓ ${newRecords.length} traitements restaurés`, "success");
        }}
        onExportSauvegarde={() => {}}
        onExportVachesCSV={() => {}}
      />

      {/* ── PANNEAU ALERTES ── */}
      {showAlertes && (
        <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, zIndex: 150, display: "flex", flexDirection: "column" }}>
          <div onClick={() => setShowAlertes(false)} style={{ position: "fixed", inset: 0, background: "#0004", zIndex: -1 }} />
          <div style={{ marginLeft: "auto", width: 340, height: "100%", background: "#fff", boxShadow: "-4px 0 32px #0003", display: "flex", flexDirection: "column", overflowY: "auto" }}>
            {/* Header */}
            <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", padding: "18px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
              <div>
                <div style={{ color: "#a8d5a2", fontSize: 10, letterSpacing: 3, textTransform: "uppercase", fontFamily: "sans-serif" }}>Surveillance</div>
                <h3 style={{ margin: 0, color: "#fff", fontSize: 17, fontWeight: 900 }}>🔔 Alertes délais</h3>
              </div>
              <button onClick={() => setShowAlertes(false)} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontSize: 17 }}>✕</button>
            </div>

            <div style={{ padding: "16px", flex: 1 }}>
              {/* Bouton activer notifications */}
              {notifPermission !== "granted" && (
                <div style={{ background: "#e8f5e9", border: "1px solid #a5d6a7", borderRadius: 10, padding: "12px 14px", marginBottom: 14, fontFamily: "sans-serif" }}>
                  <div style={{ fontWeight: 700, fontSize: 13, color: "#1a3a1a", marginBottom: 4 }}>🔔 Activer les notifications</div>
                  <div style={{ fontSize: 12, color: "#5a7a5a", marginBottom: 8 }}>Recevez une alerte automatique le matin ou le soir quand un délai expire.</div>
                  <button onClick={requestNotifPermission}
                    style={{ background: "#2d5a27", color: "#fff", border: "none", borderRadius: 7, padding: "7px 16px", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "sans-serif" }}>
                    Autoriser les notifications
                  </button>
                </div>
              )}
              {notifPermission === "granted" && (
                <div style={{ background: "#e8f5e9", border: "1px solid #a5d6a7", borderRadius: 8, padding: "8px 12px", marginBottom: 12, fontFamily: "sans-serif", fontSize: 12, color: "#2d5a27", display: "flex", alignItems: "center", gap: 6 }}>
                  ✅ Notifications activées — vous serez alerté automatiquement
                </div>
              )}

              {alertes.length === 0 ? (
                <div style={{ textAlign: "center", padding: "40px 16px", color: "#5a7a5a" }}>
                  <div style={{ fontSize: 40, marginBottom: 10 }}>✅</div>
                  <div style={{ fontWeight: 700, color: "#2d5a27", fontSize: 15, fontFamily: "sans-serif" }}>Aucune alerte</div>
                  <div style={{ fontSize: 12, color: "#8aaa8a", fontFamily: "sans-serif", marginTop: 4 }}>Tous les délais &gt; 3 jours</div>
                </div>
              ) : (
                <>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
                    {alertes.filter(a => a.urgence === "high").length > 0 && (
                      <span style={{ background: "#ffebee", color: "#c62828", borderRadius: 20, padding: "2px 10px", fontWeight: 700, fontSize: 11, fontFamily: "sans-serif" }}>
                        🚨 {alertes.filter(a => a.urgence === "high").length} aujourd'hui
                      </span>
                    )}
                    {alertes.filter(a => a.urgence === "med").length > 0 && (
                      <span style={{ background: "#fff3cd", color: "#7a4f00", borderRadius: 20, padding: "2px 10px", fontWeight: 700, fontSize: 11, fontFamily: "sans-serif" }}>
                        ⚠️ {alertes.filter(a => a.urgence === "med").length} demain
                      </span>
                    )}
                    {alertes.filter(a => a.urgence === "low").length > 0 && (
                      <span style={{ background: "#e8f5e9", color: "#2d5a27", borderRadius: 20, padding: "2px 10px", fontWeight: 700, fontSize: 11, fontFamily: "sans-serif" }}>
                        📅 {alertes.filter(a => a.urgence === "low").length} dans 2-3j
                      </span>
                    )}
                  </div>
                  {alertes.map((a, i) => {
                    const momentEmoji = a.moment === "matin" ? "🌅" : "🌆";
                    const bgMap = { high: "#fff5f5", med: "#fffdf0", low: "#f7fbf7" };
                    const borderMap = { high: "#ffcdd2", med: "#ffe082", low: "#c8e6c9" };
                    const badgeMap = {
                      high: { bg: "#ffebee", color: "#c62828", text: "AUJOURD'HUI" },
                      med: { bg: "#fff3cd", color: "#7a4f00", text: "DEMAIN" },
                      low: { bg: "#e8f5e9", color: "#2d5a27", text: a.quand.toUpperCase() }
                    };
                    const badge = badgeMap[a.urgence];
                    return (
                      <div key={i} onClick={() => { setDetailId(a.id); setShowAlertes(false); }}
                        style={{ background: bgMap[a.urgence], border: `1px solid ${borderMap[a.urgence]}`, borderRadius: 10, padding: "12px 14px", marginBottom: 10, cursor: "pointer", transition: "transform 0.1s" }}
                        onMouseEnter={e => e.currentTarget.style.transform = "translateX(-2px)"}
                        onMouseLeave={e => e.currentTarget.style.transform = "none"}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ fontWeight: 800, fontSize: 14, color: "#1a3a1a", fontFamily: "sans-serif" }}>🐄 {a.vache}</div>
                            <div style={{ fontSize: 13, color: a.color, fontWeight: 700, fontFamily: "sans-serif", marginTop: 3 }}>
                              {a.icon} Délai {a.type} expire
                            </div>
                            <div style={{ fontSize: 12, color: "#5a7a5a", fontFamily: "sans-serif", marginTop: 4, display: "flex", gap: 8, flexWrap: "wrap" }}>
                              <span>📅 {formatDateAvecJour(a.date)}</span>
                              <span style={{ background: a.moment === "matin" ? "#e3f2fd" : "#f3e5f5", color: a.moment === "matin" ? "#1565c0" : "#6a1b9a", borderRadius: 6, padding: "1px 8px", fontWeight: 700 }}>
                                {momentEmoji} {a.moment.charAt(0).toUpperCase() + a.moment.slice(1)}
                              </span>
                            </div>
                            {a.urgence === "high" && (
                              <div style={{ marginTop: 6, fontSize: 11, fontWeight: 700, color: "#c62828", fontFamily: "sans-serif", background: "#ffebee", borderRadius: 5, padding: "3px 8px", display: "inline-block" }}>
                                ⛔ Ne pas collecter le lait {a.type === "LAIT" ? "de cette traite" : ""}
                              </div>
                            )}
                          </div>
                          <span style={{ background: badge.bg, color: badge.color, borderRadius: 20, padding: "2px 10px", fontSize: 10, fontWeight: 800, letterSpacing: 1, textTransform: "uppercase", fontFamily: "sans-serif", flexShrink: 0, marginTop: 2 }}>
                            {badge.text}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ marginTop: 6, fontSize: 11, color: "#8aaa8a", fontFamily: "sans-serif", textAlign: "center" }}>
                    Cliquer sur une alerte pour voir le détail
                  </div>
                </>
              )}
            </div>

            {/* Légende matin/soir */}
            <div style={{ padding: "14px 16px", borderTop: "1px solid #e8f0e8", background: "#f7fbf7", flexShrink: 0 }}>
              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 8 }}>Rappel traite</div>
              <div style={{ display: "flex", gap: 8 }}>
                <div style={{ flex: 1, background: "#e3f2fd", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
                  <div style={{ fontSize: 16 }}>🌅</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#1565c0", marginTop: 2 }}>Traite matin</div>
                  <div style={{ fontSize: 10, color: "#5a7a5a" }}>Vérifier délai lait avant collecte du matin</div>
                </div>
                <div style={{ flex: 1, background: "#f3e5f5", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
                  <div style={{ fontSize: 16 }}>🌆</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: "#6a1b9a", marginTop: 2 }}>Traite soir</div>
                  <div style={{ fontSize: 10, color: "#5a7a5a" }}>Vérifier délai lait avant collecte du soir</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* HEADER */}
      <div style={{ background: "linear-gradient(135deg,#1a3a1a 0%,#2d5a27 60%,#4a7c3f 100%)", color: "#fff", boxShadow: "0 4px 24px #0003" }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "22px 20px 14px" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
            {/* Hamburger */}
            <button onClick={() => setShowMenu(true)}
              style={{ background: "#ffffff22", border: "1px solid #ffffff44", color: "#fff", borderRadius: 8, padding: "8px 12px", cursor: "pointer", fontSize: 18, lineHeight: 1, flexShrink: 0 }}
              title="Menu">☰</button>
            <div style={{ fontSize: 42, lineHeight: 1 }}>🐄</div>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 4, textTransform: "uppercase", color: "#a8d5a2", fontFamily: "sans-serif", marginBottom: 2 }}>Élevage bovin lait</div>
              <h1 style={{ margin: 0, fontSize: 24, fontWeight: 900, letterSpacing: -1 }}>Carnet Sanitaire</h1>
              <div style={{ fontSize: 11, color: "#c8e6c5", marginTop: 2, fontFamily: "sans-serif" }}>Registre des traitements vétérinaires — {vaches.length} vaches</div>
            </div>
            <div style={{ marginLeft: "auto", display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
              {[{ n: records.length, label: "Traitements" }, { n: new Set(records.map(r => r.nomVache)).size, label: "Vaches" }, { n: vaches.length, label: "Troupeau" }].map(({ n, label }) => (
                <div key={label} style={{ background: "#ffffff18", borderRadius: 10, padding: "6px 14px", textAlign: "center", fontFamily: "sans-serif" }}>
                  <div style={{ fontSize: 19, fontWeight: 900 }}>{n}</div>
                  <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#c8e6c5" }}>{label}</div>
                </div>
              ))}

              {/* Cloche alertes + menu Drive déplacé dans ☰ */}
              <div style={{ display: "flex", gap: 6, marginLeft: 6 }}>
                <button onClick={() => setShowAlertes(o => !o)}
                  title="Alertes délais d'attente"
                  style={{ position: "relative", background: alertes.length > 0 ? "#fff3cd" : "#ffffff22", border: alertes.length > 0 ? "1px solid #f0c040" : "1px solid #ffffff44", color: alertes.length > 0 ? "#7a4f00" : "#fff", borderRadius: 8, padding: "7px 14px", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 6 }}>
                  🔔
                  {alertes.length > 0 && (
                    <span style={{ background: "#c62828", color: "#fff", borderRadius: 20, fontSize: 10, fontWeight: 900, padding: "1px 6px", minWidth: 18, textAlign: "center" }}>{alertes.length}</span>
                  )}
                </button>
              </div>
            </div>
          </div>

          <div style={{ marginTop: 12, display: "flex", gap: 10, flexWrap: "wrap" }}>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Rechercher (vache, médicament, intervenant…)"
              style={{ flex: 1, minWidth: 200, padding: "9px 14px", borderRadius: 8, border: "none", fontSize: 13, fontFamily: "sans-serif", background: "#ffffff22", color: "#fff", outline: "none" }} />
            <button onClick={() => { setShowForm(true); setForm(emptyForm); setEditId(null); }}
              style={{ background: "#fff", color: "#1a3a1a", border: "none", borderRadius: 8, padding: "9px 20px", fontWeight: 800, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", boxShadow: "0 2px 8px #0002" }}>
              + Nouveau traitement
            </button>
          </div>

          <div style={{ marginTop: 8, fontSize: 11, color: "#a8d5a2", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 6 }}>
            💾 {lastSaved ? `Sauvegarde automatique · ${new Date(lastSaved).toLocaleTimeString("fr-FR", {hour:"2-digit",minute:"2-digit"})}` : "Sauvegarde automatique locale activée"}
          </div>
        </div>
        <div style={{ height: 4, background: "linear-gradient(90deg,#4caf50,#8bc34a,#cddc39)" }} />
      </div>

      <div style={{ maxWidth: 1180, margin: "0 auto", padding: "18px 16px" }}>

        {/* FORM MODAL */}
        {showForm && (
          <div style={{ position: "fixed", inset: 0, background: "#0007", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: 660, boxShadow: "0 8px 48px #0004", maxHeight: "92vh", overflowY: "auto" }}>
              <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", borderRadius: "16px 16px 0 0", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ color: "#a8d5a2", fontSize: 10, letterSpacing: 3, textTransform: "uppercase", fontFamily: "sans-serif" }}>{editId ? "Modifier" : "Nouveau"}</div>
                  <h2 style={{ margin: 0, color: "#fff", fontSize: 18, fontWeight: 900 }}>Traitement vétérinaire</h2>
                </div>
                <button onClick={() => { setShowForm(false); setEditId(null); }} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 11px", cursor: "pointer", fontSize: 17 }}>✕</button>
              </div>
              <div style={{ padding: "18px 22px" }}>
                <div style={{ marginBottom: 16 }}>
                  <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 6, fontFamily: "sans-serif" }}>Vache(s) *</label>
                  <VacheSelector selected={form.selectedVaches || []} onChange={handleVacheSelect} vaches={vaches} />
                  {form.selectedVaches && form.selectedVaches.length > 1 && (
                    <div style={{ marginTop: 6, fontSize: 12, color: "#2d5a27", fontFamily: "sans-serif", background: "#e8f5e9", borderRadius: 6, padding: "5px 10px", fontWeight: 600 }}>
                      ✓ {form.selectedVaches.length} traitements seront créés (un par vache)
                    </div>
                  )}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>

                  {/* Début */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>Date début traitement *</label>
                    <input type="date" name="dateDebut" value={form.dateDebut} onChange={handleChange}
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                    <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                      {["matin", "soir"].map(m => (
                        <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: form.momentDebut === m ? 700 : 400, color: form.momentDebut === m ? "#1a3a1a" : "#7a9a7a" }}>
                          <input type="radio" name="momentDebut" value={m} checked={form.momentDebut === m} onChange={handleChange} style={{ accentColor: "#2d5a27" }} />
                          {m.charAt(0).toUpperCase() + m.slice(1)}
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* Fin */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>Date fin traitement</label>
                    <input type="date" name="dateFin" value={form.dateFin} onChange={handleChange}
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                    <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                      {["matin", "soir"].map(m => (
                        <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: form.momentFin === m ? 700 : 400, color: form.momentFin === m ? "#1a3a1a" : "#7a9a7a" }}>
                          <input type="radio" name="momentFin" value={m} checked={form.momentFin === m} onChange={handleChange} style={{ accentColor: "#2d5a27" }} />
                          {m.charAt(0).toUpperCase() + m.slice(1)}
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* Raison */}
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>Raison du traitement</label>
                    <input type="text" name="raison" value={form.raison} onChange={handleChange} placeholder="Ex: Mammite, boiterie…"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                  </div>

                  {/* Médicament */}
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>Nom du médicament</label>
                    <MedicamentSelector value={form.medicament} onSelect={handleMedicamentSelect} />
                  </div>

                  {/* Posologie */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>💊 Posologie</label>
                    <input type="text" name="posologie" value={form.posologie} onChange={handleChange} placeholder="Ex: 1 inj/jour pendant 5 jours"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                  </div>

                  {/* Quantité */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>⚖️ Quantité / Dose</label>
                    <input type="text" name="quantite" value={form.quantite} onChange={handleChange} placeholder="Ex: 10 ml, 2 comprimés"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                  </div>

                  {/* Voie d'administration */}
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 6, fontFamily: "sans-serif" }}>💉 Voie d'administration</label>
                    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                      {[
                        { val: "Injectable IM", emoji: "💉" },
                        { val: "Injectable IV", emoji: "🩸" },
                        { val: "Injectable SC", emoji: "🔬" },
                        { val: "Intramammaire", emoji: "🐄" },
                        { val: "Per os (oral)", emoji: "👄" },
                        { val: "Topique", emoji: "🖐️" },
                        { val: "Pour-on", emoji: "💧" },
                        { val: "Autre", emoji: "➕" },
                      ].map(({ val, emoji }) => (
                        <button key={val} type="button"
                          onClick={() => setForm(f => ({ ...f, voieAdmin: f.voieAdmin === val ? "" : val }))}
                          style={{
                            padding: "7px 14px", borderRadius: 20, fontSize: 13, fontFamily: "sans-serif", fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                            border: form.voieAdmin === val ? "2px solid #2d5a27" : "2px solid #d4e8d4",
                            background: form.voieAdmin === val ? "#2d5a27" : "#f7fbf7",
                            color: form.voieAdmin === val ? "#fff" : "#3a5a3a",
                          }}>
                          {emoji} {val}
                        </button>
                      ))}
                    </div>
                    {form.voieAdmin === "Autre" && (
                      <input type="text" name="voieAdminAutre" placeholder="Préciser la voie…"
                        value={form.voieAdminAutre || ""}
                        onChange={e => setForm(f => ({ ...f, voieAdminAutre: e.target.value }))}
                        style={{ marginTop: 8, width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                        onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                    )}
                  </div>

                  {/* Attente lait */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#1565c0", marginBottom: 5, fontFamily: "sans-serif" }}>🥛 Délai attente LAIT (jours)</label>
                    <input type="number" name="joursAttenteL" value={form.joursAttenteL} onChange={handleChange} placeholder="Ex: 4" min="0"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #bbdefb", fontSize: 14, fontFamily: "sans-serif", color: "#1565c0", background: "#f3f8ff", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#1565c0"} onBlur={e => e.target.style.borderColor = "#bbdefb"} />
                    <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                      {["matin", "soir"].map(m => (
                        <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: form.momentAttenteL === m ? 700 : 400, color: form.momentAttenteL === m ? "#1565c0" : "#7a9a7a" }}>
                          <input type="radio" name="momentAttenteL" value={m} checked={form.momentAttenteL === m} onChange={handleChange} style={{ accentColor: "#1565c0" }} />
                          {m === "matin" ? "🌅 Matin" : "🌆 Soir"}
                        </label>
                      ))}
                    </div>
                    {form.joursAttenteL && form.dateDebut && (
                      <div style={{ marginTop: 5, fontSize: 12, color: "#1565c0", fontFamily: "sans-serif", fontWeight: 600, background: "#e3f2fd", borderRadius: 6, padding: "4px 10px" }}>
                        📅 Fin attente : {formatDateAvecJour(addDays(form.dateDebut, form.joursAttenteL))} — {form.momentAttenteL}
                      </div>
                    )}
                  </div>

                  {/* Attente viande */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#b71c1c", marginBottom: 5, fontFamily: "sans-serif" }}>🥩 Délai attente VIANDE (jours)</label>
                    <input type="number" name="joursAttenteV" value={form.joursAttenteV} onChange={handleChange} placeholder="Ex: 28" min="0"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #ffcdd2", fontSize: 14, fontFamily: "sans-serif", color: "#b71c1c", background: "#fff5f5", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#b71c1c"} onBlur={e => e.target.style.borderColor = "#ffcdd2"} />
                    <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                      {["matin", "soir"].map(m => (
                        <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: form.momentAttenteV === m ? 700 : 400, color: form.momentAttenteV === m ? "#b71c1c" : "#7a9a7a" }}>
                          <input type="radio" name="momentAttenteV" value={m} checked={form.momentAttenteV === m} onChange={handleChange} style={{ accentColor: "#b71c1c" }} />
                          {m === "matin" ? "🌅 Matin" : "🌆 Soir"}
                        </label>
                      ))}
                    </div>
                    {form.joursAttenteV && form.dateDebut && (
                      <div style={{ marginTop: 5, fontSize: 12, color: "#b71c1c", fontFamily: "sans-serif", fontWeight: 600, background: "#ffebee", borderRadius: 6, padding: "4px 10px" }}>
                        📅 Fin attente : {formatDateAvecJour(addDays(form.dateDebut, form.joursAttenteV))} — {form.momentAttenteV}
                      </div>
                    )}
                  </div>

                  {/* Ordonnance */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>N° ordonnance</label>
                    <input type="text" name="numOrdonnance" value={form.numOrdonnance} onChange={handleChange} placeholder="Ex: ORD-2024-001"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                  </div>

                  {/* Intervenant */}
                  <div>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>Intervenant</label>
                    <input type="text" name="intervenant" value={form.intervenant} onChange={handleChange} placeholder="Ex: Dr. Dupont"
                      style={{ width: "100%", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", outline: "none", boxSizing: "border-box" }}
                      onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
                  </div>

                  {/* Photo ordonnance */}
                  <div style={{ gridColumn: "1 / -1" }}>
                    <label style={{ display: "block", fontSize: 11, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#3a5a3a", marginBottom: 5, fontFamily: "sans-serif" }}>📷 Photo de l'ordonnance</label>

                    {form.photoOrdonnance ? (
                      <div style={{ width: "100%" }}>
                        <div style={{ position: "relative" }}>
                          <img src={form.photoOrdonnance} alt="Ordonnance"
                            style={{ width: "100%", maxHeight: 200, objectFit: "contain", borderRadius: 8, border: "2px solid #d4e8d4", background: "#f7fbf7", cursor: "pointer" }}
                            onClick={() => setLightbox(form.photoOrdonnance)} />
                          <button onClick={() => setForm(f => ({ ...f, photoOrdonnance: "" }))}
                            style={{ position: "absolute", top: 6, right: 6, background: "#c62828", border: "none", color: "#fff", borderRadius: 20, width: 26, height: 26, cursor: "pointer", fontSize: 14, fontWeight: 900, display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
                        </div>
                        <div style={{ marginTop: 5, fontSize: 11, color: "#8aaa8a", fontFamily: "sans-serif" }}>Cliquer sur l'image pour agrandir · ✕ pour supprimer</div>
                      </div>

                    ) : (
                      // Zone drag & drop + coller
                      <PhotoDropZone onImage={dataUrl => setForm(f => ({ ...f, photoOrdonnance: dataUrl }))} />
                    )}
                  </div>

                </div>
              </div>
              <div style={{ padding: "0 22px 18px", display: "flex", gap: 10, justifyContent: "flex-end" }}>
                <button onClick={() => { setShowForm(false); setEditId(null); }} style={{ padding: "9px 18px", borderRadius: 8, border: "2px solid #d4e8d4", background: "#fff", color: "#2d5a27", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>Annuler</button>
                <button onClick={handleSubmit} style={{ padding: "9px 24px", borderRadius: 8, border: "none", background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "sans-serif", fontSize: 14 }}>{editId ? "✓ Enregistrer" : "✓ Ajouter"}</button>
              </div>
            </div>
          </div>
        )}

      {/* LIGHTBOX */}
        {lightbox && (
          <div onClick={() => setLightbox(null)} style={{ position: "fixed", inset: 0, background: "#000c", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: 16, cursor: "zoom-out" }}>
            <div onClick={e => e.stopPropagation()} style={{ position: "relative", maxWidth: "95vw", maxHeight: "92vh" }}>
              <img src={lightbox} alt="Ordonnance"
                style={{ maxWidth: "90vw", maxHeight: "88vh", borderRadius: 10, boxShadow: "0 8px 48px #000a", objectFit: "contain" }} />
              <button onClick={() => setLightbox(null)}
                style={{ position: "absolute", top: -14, right: -14, background: "#c62828", border: "none", color: "#fff", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", fontSize: 17, fontWeight: 900, boxShadow: "0 2px 8px #0004" }}>✕</button>
              <a href={lightbox} download="ordonnance.jpg"
                style={{ position: "absolute", bottom: -14, right: -14, background: "#2d5a27", border: "none", color: "#fff", borderRadius: "50%", width: 32, height: 32, cursor: "pointer", fontSize: 16, display: "flex", alignItems: "center", justifyContent: "center", textDecoration: "none", boxShadow: "0 2px 8px #0004" }}
                title="Télécharger">⬇</a>
            </div>
          </div>
        )}

        {/* DETAIL MODAL */}
        {detail && (
          <div style={{ position: "fixed", inset: 0, background: "#0007", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: "#fff", borderRadius: 16, width: "100%", maxWidth: 540, boxShadow: "0 8px 48px #0004" }}>
              <div style={{ background: "linear-gradient(135deg,#1a3a1a,#4a7c3f)", borderRadius: "16px 16px 0 0", padding: "16px 24px", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ color: "#a8d5a2", fontSize: 10, letterSpacing: 3, textTransform: "uppercase", fontFamily: "sans-serif" }}>Détail du traitement</div>
                  <h2 style={{ margin: "3px 0 0", color: "#fff", fontSize: 20, fontWeight: 900 }}>🐄 {detail.nomVache}</h2>
                  {detail.numeroVache && <div style={{ color: "#c8e6c5", fontSize: 11, fontFamily: "sans-serif", marginTop: 2 }}>{detail.numeroVache} · N° {detail.travailVache}</div>}
                </div>
                <button onClick={() => setDetailId(null)} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 11px", cursor: "pointer", fontSize: 17, marginTop: 2 }}>✕</button>
              </div>
              <div style={{ padding: "16px 24px" }}>
                <StatusBadge record={detail} />
                <div style={{ marginTop: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                  {[
                    { label: "Médicament", value: detail.medicament },
                    { label: "Raison", value: detail.raison },
                    { label: "💊 Posologie", value: detail.posologie },
                    { label: "⚖️ Quantité / Dose", value: detail.quantite },
                    { label: "💉 Voie d'administration", value: detail.voieAdmin === "Autre" ? detail.voieAdminAutre : detail.voieAdmin, span: true },
                    { label: "Début traitement", value: detail.dateDebut ? `${formatDateAvecJour(detail.dateDebut)} — ${detail.momentDebut || "matin"}` : "—" },
                    { label: "Fin traitement", value: detail.dateFin ? `${formatDateAvecJour(detail.dateFin)} — ${detail.momentFin || "matin"}` : "—" },
                    { label: "Délai attente LAIT", value: detail.joursAttenteL ? `${detail.joursAttenteL} j → ${formatDateAvecJour(getDateAttenteL(detail))} ${detail.momentAttenteL === "matin" ? "🌅 matin" : "🌆 soir"}` : "—", accent: "#1565c0" },
                    { label: "Délai attente VIANDE", value: detail.joursAttenteV ? `${detail.joursAttenteV} j → ${formatDateAvecJour(getDateAttenteV(detail))} ${detail.momentAttenteV === "matin" ? "🌅 matin" : "🌆 soir"}` : "—", accent: "#b71c1c" },
                    { label: "N° ordonnance", value: detail.numOrdonnance },
                    { label: "Intervenant", value: detail.intervenant },
                  ].map(({ label, value, accent, span }) => (
                    <div key={label} style={{ background: "#f7fbf7", borderRadius: 8, padding: "8px 12px", borderLeft: `3px solid ${accent || "#2d5a27"}`, gridColumn: span ? "1 / -1" : undefined }}>
                      <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 3 }}>{label}</div>
                      <div style={{ fontWeight: 700, color: accent || "#1a3a1a", fontFamily: "sans-serif", fontSize: 13 }}>{value || "—"}</div>
                    </div>
                  ))}
                </div>

                {/* Photo ordonnance dans le détail */}
                {detail.photoOrdonnance && (
                  <div style={{ marginTop: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 6 }}>📷 Photo de l'ordonnance</div>
                    <div style={{ position: "relative", display: "inline-block", width: "100%" }}>
                      <img src={detail.photoOrdonnance} alt="Ordonnance"
                        onClick={() => setLightbox(detail.photoOrdonnance)}
                        style={{ width: "100%", maxHeight: 180, objectFit: "contain", borderRadius: 8, border: "2px solid #d4e8d4", background: "#f7fbf7", cursor: "zoom-in" }} />
                      <div style={{ marginTop: 4, fontSize: 11, color: "#5a7a5a", fontFamily: "sans-serif", display: "flex", gap: 12 }}>
                        <span style={{ cursor: "pointer", color: "#1565c0", fontWeight: 600 }} onClick={() => setLightbox(detail.photoOrdonnance)}>🔍 Agrandir</span>
                        <a href={detail.photoOrdonnance} download="ordonnance.jpg" style={{ color: "#2d5a27", fontWeight: 600, textDecoration: "none" }}>⬇ Télécharger</a>
                      </div>
                    </div>
                  </div>
                )}
                {!detail.photoOrdonnance && (
                  <div style={{ marginTop: 12, padding: "10px 14px", borderRadius: 8, border: "1px dashed #c8d8c8", background: "#f7fbf7", fontFamily: "sans-serif", fontSize: 12, color: "#8aaa8a", textAlign: "center" }}>
                    📄 Aucune photo d'ordonnance — modifier pour en ajouter une
                  </div>
                )}
                <div style={{ marginTop: 16, display: "flex", gap: 10, justifyContent: "flex-end" }}>
                  <button onClick={() => setConfirmDelete(detail.id)} style={{ padding: "8px 14px", borderRadius: 8, border: "2px solid #ffcdd2", background: "#fff", color: "#c62828", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>🗑 Supprimer</button>
                  <button onClick={() => handleEdit(detail)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "sans-serif" }}>✎ Modifier</button>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* CONFIRM DELETE */}
        {confirmDelete && (
          <div style={{ position: "fixed", inset: 0, background: "#0008", zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}>
            <div style={{ background: "#fff", borderRadius: 14, padding: "24px 28px", maxWidth: 320, textAlign: "center", boxShadow: "0 8px 40px #0004" }}>
              <div style={{ fontSize: 36, marginBottom: 10 }}>⚠️</div>
              <h3 style={{ margin: "0 0 8px", color: "#1a3a1a", fontWeight: 900 }}>Confirmer la suppression</h3>
              <p style={{ color: "#555", fontFamily: "sans-serif", fontSize: 13, margin: "0 0 16px" }}>Cette action est irréversible.</p>
              <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                <button onClick={() => setConfirmDelete(null)} style={{ padding: "8px 16px", borderRadius: 8, border: "2px solid #ddd", background: "#fff", color: "#333", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>Annuler</button>
                <button onClick={() => handleDelete(confirmDelete)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#c62828", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "sans-serif" }}>Supprimer</button>
              </div>
            </div>
          </div>
        )}

        {/* TABLE */}
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "52px 24px", color: "#5a7a5a" }}>
            <div style={{ fontSize: 52, marginBottom: 12 }}>🐄</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#2d5a27", marginBottom: 6 }}>
              {records.length === 0 ? "Aucun traitement enregistré" : "Aucun résultat trouvé"}
            </div>
            <div style={{ fontSize: 13, fontFamily: "sans-serif", color: "#7a9a7a" }}>
              {records.length === 0 ? 'Cliquez sur "+ Nouveau traitement" pour commencer\nou restaurez vos données depuis Google Drive ↗' : "Essayez un autre terme"}
            </div>
          </div>
        ) : (
          <div style={{ overflowX: "auto", borderRadius: 14, boxShadow: "0 2px 20px #0001", background: "#fff" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "sans-serif" }}>
              <thead>
                <tr style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", color: "#fff" }}>
                  {["Vache", "N° travail", "Médicament", "Voie", "Posologie / Dose", "Raison", "Début", "Fin", "Att. Lait", "Att. Viande", "Ordonnance", "Intervenant", "Statut", ""].map(h => (
                    <th key={h} style={{ padding: "10px 11px", textAlign: "left", fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, i) => (
                  <tr key={r.id} onClick={() => setDetailId(r.id)}
                    style={{ background: i % 2 === 0 ? "#fff" : "#f7fbf7", cursor: "pointer", transition: "background 0.15s" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#e8f5e9"}
                    onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? "#fff" : "#f7fbf7"}>
                    <td style={{ padding: "9px 11px", fontWeight: 800, color: "#1a3a1a", whiteSpace: "nowrap" }}>🐄 {r.nomVache}</td>
                    <td style={{ padding: "9px 11px", color: "#2d5a27", fontWeight: 600 }}>{r.travailVache || "—"}</td>
                    <td style={{ padding: "9px 11px", color: "#2d5a27", fontWeight: 600, maxWidth: 140, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.medicament || "—"}</td>
                    <td style={{ padding: "9px 11px", color: "#555", whiteSpace: "nowrap" }}>
                      {r.voieAdmin ? <span style={{ background: "#f3e5f5", color: "#6a1b9a", borderRadius: 5, padding: "2px 7px", fontSize: 11, fontWeight: 700 }}>{r.voieAdmin === "Autre" ? r.voieAdminAutre : r.voieAdmin}</span> : "—"}
                    </td>
                    <td style={{ padding: "9px 11px", color: "#555", fontSize: 12 }}>
                      {r.posologie && <div>{r.posologie}</div>}
                      {r.quantite && <div style={{ color: "#2d5a27", fontWeight: 600 }}>{r.quantite}</div>}
                      {!r.posologie && !r.quantite && "—"}
                    </td>
                    <td style={{ padding: "9px 11px", color: "#555" }}>{r.raison || "—"}</td>
                    <td style={{ padding: "9px 11px", color: "#333", whiteSpace: "nowrap", fontSize: 12 }}>{r.dateDebut ? `${formatDate(r.dateDebut)} ${r.momentDebut || ""}` : "—"}</td>
                    <td style={{ padding: "9px 11px", color: "#333", whiteSpace: "nowrap", fontSize: 12 }}>{r.dateFin ? `${formatDate(r.dateFin)} ${r.momentFin || ""}` : "—"}</td>
                    <td style={{ padding: "9px 11px", color: "#1565c0", fontWeight: 700, whiteSpace: "nowrap", fontSize: 12 }}>
                      {r.joursAttenteL ? <>{r.joursAttenteL}j<br/><span style={{fontWeight:400}}>{formatDate(getDateAttenteL(r))}</span></> : "—"}
                    </td>
                    <td style={{ padding: "9px 11px", color: "#b71c1c", fontWeight: 700, whiteSpace: "nowrap", fontSize: 12 }}>
                      {r.joursAttenteV ? <>{r.joursAttenteV}j<br/><span style={{fontWeight:400}}>{formatDate(getDateAttenteV(r))}</span></> : "—"}
                    </td>
                    <td style={{ padding: "9px 11px", color: "#555" }}>{r.numOrdonnance || "—"}{r.photoOrdonnance && <span title="Photo ordonnance" style={{ marginLeft: 5, fontSize: 12 }}>📷</span>}</td>
                    <td style={{ padding: "9px 11px", color: "#555" }}>{r.intervenant || "—"}</td>
                    <td style={{ padding: "9px 11px" }}><StatusBadge record={r} /></td>
                    <td style={{ padding: "9px 7px" }}>
                      <div style={{ display: "flex", gap: 4 }}>
                        <button onClick={e => { e.stopPropagation(); handleEdit(r); }} style={{ padding: "3px 8px", borderRadius: 6, border: "1px solid #c8e6c9", background: "#f1f8e9", color: "#2d5a27", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>✎</button>
                        <button onClick={e => { e.stopPropagation(); setConfirmDelete(r.id); }} style={{ padding: "3px 8px", borderRadius: 6, border: "1px solid #ffcdd2", background: "#fff8f8", color: "#c62828", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>🗑</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        <div style={{ marginTop: 24, textAlign: "center", color: "#8aaa8a", fontSize: 10, fontFamily: "sans-serif", letterSpacing: 1 }}>
          CARNET SANITAIRE BOVIN LAIT — Conforme réglementation française — {vaches.length} animaux
        </div>
      </div>
    </div>
  );
}

const { useState, useMemo, useRef, useEffect } = React;
const rootElement = document.getElementById('root');
ReactDOM.createRoot(rootElement).render(React.createElement(App));
</script>
</body>
</html>
