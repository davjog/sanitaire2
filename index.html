let deferredPrompt=null;

  e.preventDefault();deferredPrompt=e;

});

// Helper : ajoute N jours à une date "YYYY-MM-DD"
function addDays(dateStr, days) {
  if (!dateStr || !days) return "";
  const d = new Date(dateStr);
  d.setDate(d.getDate() + parseInt(days, 10));
  return d.toISOString().split("T")[0];
}

const JOURS_SEMAINE = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];

function formatDateAvecJour(d) {
  if (!d || d === "nan") return "—";
  const [y, m, j] = d.split("-");
  const date = new Date(d);
  const jour = JOURS_SEMAINE[date.getDay()];
  return `${jour} ${j}/${m}/${y}`;
}

// ── helpers ──
function getDateAttenteL(r) { return r.joursAttenteL ? addDays(r.dateDebut, r.joursAttenteL) : ""; }
function getDateAttenteV(r) { return r.joursAttenteV ? addDays(r.dateDebut, r.joursAttenteV) : ""; }

function StatusBadge({ record }) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const dL = getDateAttenteL(record) ? new Date(getDateAttenteL(record)) : null;
  const dV = getDateAttenteV(record) ? new Date(getDateAttenteV(record)) : null;
  const ok = (!dL || today > dL) && (!dV || today > dV);
  return ok
    ? <span style={{ background: "#d4edda", color: "#1a5c2a", borderRadius: 20, padding: "3px 12px", fontSize: 11, fontWeight: 700, letterSpacing: 1, whiteSpace: "nowrap" }}>✓ LIBÉRÉ</span>
    : <span style={{ background: "#fff3cd", color: "#7a4f00", borderRadius: 20, padding: "3px 12px", fontSize: 11, fontWeight: 700, letterSpacing: 1, whiteSpace: "nowrap" }}>⚠ EN ATTENTE</span>;
}

  if (!d || d === "nan") return "—";
  const [y, m, j] = d.split("-");
  return `${j}/${m}/${y}`;
}

function VacheSelector({ selected, onChange, vaches }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const liste = vaches || VACHES_DEFAUT;
  const filtered = liste.filter(v =>
    v.nom.toLowerCase().includes(query.toLowerCase()) ||
    v.travail.includes(query) ||
    v.numero.includes(query)
  );
  const toggle = (v) => {
    const exists = selected.find(s => s.nom === v.nom);
    if (exists) onChange(selected.filter(s => s.nom !== v.nom));
    else onChange([...selected, v]);
  };
  const selectAll = () => onChange(filtered);
  const clearAll = () => onChange([]);

  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", cursor: "pointer", justifyContent: "space-between", minHeight: 46 }}>
        {selected.length === 0
          ? <span style={{ color: "#8aaa8a" }}>Sélectionner une ou plusieurs vaches…</span>
          : <div style={{ display: "flex", flexWrap: "wrap", gap: 5, flex: 1 }}>
              {selected.map(v => (
                <span key={v.nom} style={{ background: "#2d5a27", color: "#fff", borderRadius: 20, padding: "2px 10px", fontSize: 12, fontWeight: 700, display: "flex", alignItems: "center", gap: 4 }}>
                  🐄 {v.nom}
                  <span onClick={e => { e.stopPropagation(); toggle(v); }} style={{ cursor: "pointer", fontSize: 13, fontWeight: 900, marginLeft: 2 }}>✕</span>
                </span>
              ))}
            </div>}
        <span style={{ color: "#5a7a5a", fontSize: 12, flexShrink: 0 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 999, background: "#fff", borderRadius: 10, border: "2px solid #d4e8d4", boxShadow: "0 8px 32px #0002", maxHeight: 340, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid #e8f0e8", display: "flex", gap: 6 }}>
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)} placeholder="🔍 Rechercher…"
              style={{ flex: 1, padding: "7px 10px", borderRadius: 6, border: "1px solid #d4e8d4", fontSize: 13, fontFamily: "sans-serif", outline: "none", boxSizing: "border-box" }} />
            <button onClick={selectAll} style={{ padding: "5px 10px", borderRadius: 6, border: "1px solid #c8e6c9", background: "#e8f5e9", color: "#2d5a27", fontWeight: 700, fontSize: 11, cursor: "pointer", fontFamily: "sans-serif", whiteSpace: "nowrap" }}>Tout</button>
            <button onClick={clearAll} style={{ padding: "5px 10px", borderRadius: 6, border: "1px solid #ffcdd2", background: "#fff8f8", color: "#c62828", fontWeight: 700, fontSize: 11, cursor: "pointer", fontFamily: "sans-serif" }}>✕</button>
          </div>
          <div style={{ overflowY: "auto", maxHeight: 260 }}>
            {filtered.length === 0
              ? <div style={{ padding: 16, textAlign: "center", color: "#8aaa8a", fontSize: 13, fontFamily: "sans-serif" }}>Aucune vache trouvée</div>
              : filtered.map(v => {
                  const isSelected = !!selected.find(s => s.nom === v.nom);
                  return (
                    <div key={v.numero} onClick={() => toggle(v)}
                      style={{ padding: "9px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "center", borderBottom: "1px solid #f0f7f0", background: isSelected ? "#e8f5e9" : "transparent" }}
                      onMouseEnter={e => e.currentTarget.style.background = isSelected ? "#d4edda" : "#f0f9f0"}
                      onMouseLeave={e => e.currentTarget.style.background = isSelected ? "#e8f5e9" : "transparent"}>
                      <div style={{ width: 20, height: 20, borderRadius: 5, border: `2px solid ${isSelected ? "#2d5a27" : "#c8d8c8"}`, background: isSelected ? "#2d5a27" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {isSelected && <span style={{ color: "#fff", fontSize: 13, fontWeight: 900 }}>✓</span>}
                      </div>
                      <span style={{ fontSize: 18 }}>🐄</span>
                      <div>
                        <div style={{ fontWeight: 700, fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a" }}>{v.nom}</div>
                        <div style={{ fontSize: 11, color: "#7a9a7a", fontFamily: "sans-serif" }}>{v.numero} · N° travail : {v.travail} · Née le {v.naissance}</div>
                      </div>
                    </div>
                  );
                })}
          </div>
          <div style={{ padding: "8px 14px", borderTop: "1px solid #e8f0e8", fontFamily: "sans-serif", fontSize: 12, color: "#5a7a5a", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>{selected.length} vache{selected.length > 1 ? "s" : ""} sélectionnée{selected.length > 1 ? "s" : ""}</span>
            <button onClick={() => setOpen(false)} style={{ padding: "5px 14px", borderRadius: 6, border: "none", background: "#2d5a27", color: "#fff", fontWeight: 700, fontSize: 12, cursor: "pointer", fontFamily: "sans-serif" }}>Valider</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Menu latéral ──
function MenuPanel({ open, onClose, vaches, onImportVaches, onImportSauvegarde, onExportSauvegarde, onExportVachesCSV, records, lastSaved, githubLoading, onGithubSave, onGithubRestore, onPrint, onStats }) {
  const csvInputRef = useRef(null);
  const jsonInputRef = useRef(null);

  const handleCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(Boolean);
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.replace(/[="]/g, "").trim().toLowerCase());
      const nomIdx = headers.findIndex(h => h.includes("nom"));
      const numIdx = headers.findIndex(h => h === "n°" || h.startsWith("n°") || h === "numero" || h.includes("national"));
      const travailIdx = headers.findIndex(h => h.includes("travail"));
      const naissIdx = headers.findIndex(h => h.includes("naissance") || h.includes("né"));
      if (nomIdx === -1) { alert("Colonne 'Nom' introuvable."); return; }
      const parsed = lines.slice(1).map(line => {
        const cols = line.split(sep).map(c => c.replace(/[="]/g, "").trim());
        return {
          nom: (cols[nomIdx] || "").toUpperCase(),
          numero: numIdx >= 0 ? cols[numIdx] : "",
          travail: travailIdx >= 0 ? cols[travailIdx] : "",
          naissance: naissIdx >= 0 ? cols[naissIdx] : "",
        };
      }).filter(v => v.nom && v.nom !== "NAN" && v.nom.length > 1);
      onImportVaches(parsed);
      onClose();
    };
    reader.readAsText(file, "latin-1");
    e.target.value = "";
  };

  const handleJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.records) { onImportSauvegarde(data.records); onClose(); }
        else alert("Format de sauvegarde invalide.");
      } catch { alert("Fichier JSON invalide."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const downloadJSON = () => {
    const blob = new Blob([JSON.stringify({ version: 1, savedAt: new Date().toISOString(), records }, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `carnet-sanitaire-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };

  const downloadVachesCSV = () => {
    const header = "Nom;Numéro;N° travail;Date naissance";
    const rows = vaches.map(v => `${v.nom};${v.numero};${v.travail};${v.naissance}`);
    const blob = new Blob([header + "\n" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = "troupeau.csv"; a.click();
  };

  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "#0006" }} />
      <div style={{ position: "relative", width: 320, background: "#fff", height: "100%", boxShadow: "4px 0 32px #0003", display: "flex", flexDirection: "column", overflowY: "auto" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", padding: "20px 20px 16px", flexShrink: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div>
              <div style={{ fontSize: 10, letterSpacing: 3, textTransform: "uppercase", color: "#a8d5a2", fontFamily: "sans-serif" }}>Navigation</div>
              <div style={{ color: "#fff", fontSize: 18, fontWeight: 900, marginTop: 2 }}>⚙️ Menu</div>
            </div>
            <button onClick={onClose} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontSize: 17 }}>✕</button>
          </div>
          <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{vaches.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Vaches</div>
            </div>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{records.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Traitements</div>
            </div>
          </div>
        </div>

        <div style={{ padding: 16, flex: 1 }}>

          {/* Section troupeau */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>
              🐄 Troupeau
            </div>

            {/* Liste vaches actuelle */}
            <div style={{ background: "#f7fbf7", borderRadius: 10, padding: "10px 12px", marginBottom: 10, maxHeight: 160, overflowY: "auto" }}>
              {vaches.length === 0 ? (
                <div style={{ color: "#8aaa8a", fontSize: 12, fontFamily: "sans-serif", textAlign: "center", padding: 8 }}>Aucune vache</div>
              ) : vaches.map(v => (
                <div key={v.numero || v.nom} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid #eef4ee", fontFamily: "sans-serif" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1a3a1a" }}>🐄 {v.nom}</span>
                  <span style={{ fontSize: 11, color: "#7a9a7a" }}>{v.travail}</span>
                </div>
              ))}
            </div>

            <input ref={csvInputRef} type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={handleCSV} />
            <button onClick={() => csvInputRef.current?.click()}
              style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #2d5a27", background: "#fff", color: "#2d5a27", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
              📥 Importer troupeau (CSV Boviclic)
            </button>
            <button onClick={downloadVachesCSV}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #d4e8d4", background: "#f7fbf7", color: "#3a5a3a", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
              📤 Exporter troupeau (CSV)
            </button>
          </div>

          {/* Section sauvegarde locale */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>
              💾 Sauvegarde locale
            </div>
            <div style={{ background: "#e8f5e9", border: "1px solid #a5d6a7", borderRadius: 8, padding: "10px 12px", marginBottom: 10, fontFamily: "sans-serif", fontSize: 12, color: "#2d5a27" }}>
              ✅ Sauvegarde automatique active<br/>
              {lastSaved
                ? <span style={{ color: "#5a7a5a" }}>Dernière sauvegarde : {new Date(lastSaved).toLocaleString("fr-FR")}</span>
                : <span style={{ color: "#5a7a5a" }}>Les données sont sauvegardées dans ce navigateur</span>}
            </div>
            <input ref={jsonInputRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleJSON} />
            <button onClick={() => jsonInputRef.current?.click()}
              style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #1565c0", background: "#fff", color: "#1565c0", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
              📥 Importer sauvegarde (JSON)
            </button>
            <button onClick={downloadJSON}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #bbdefb", background: "#f3f8ff", color: "#1565c0", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8 }}>
              📤 Exporter sauvegarde (JSON)
            </button>
          </div>

          {/* Section GitHub */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8", display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 14 }}>🐙</span> GitHub
            </div>
            <button onClick={onGithubSave} disabled={githubLoading}
              style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #1a3a1a", background: githubLoading ? "#f0f4f0" : "#fff", color: githubLoading ? "#8aaa8a" : "#1a3a1a", fontWeight: 700, fontSize: 13, cursor: githubLoading ? "not-allowed" : "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8, opacity: githubLoading ? 0.7 : 1 }}>
              🐙 {githubLoading ? "En cours…" : "Sauvegarder sur GitHub"}
            </button>
            <button onClick={onGithubRestore} disabled={githubLoading}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #ccc", background: "#f7fbf7", color: "#1a3a1a", fontWeight: 600, fontSize: 13, cursor: githubLoading ? "not-allowed" : "pointer", fontFamily: "sans-serif", display: "flex", alignItems: "center", gap: 8, opacity: githubLoading ? 0.7 : 1 }}>

              Fichier : data.json dans sanitaire2

          {/* Section PDF */}

        <div style={{ padding: "12px 16px", borderTop: "1px solid #e8f0e8", fontSize: 10, color: "#8aaa8a", fontFamily: "sans-serif", textAlign: "center" }}>
          CARNET SANITAIRE BOVIN LAIT — Conforme réglementation française
        </div>
      </div>
    </div>
  );
}

// ── Modal saisie token GitHub ──

      <div style={{ position: "relative", background: "#fff", borderRadius: 16, padding: 24, width: 360, maxWidth: "95vw", boxShadow: "0 8px 40px #0004" }}>

          Entrez votre token GitHub (ghp_...). Il sera stocké uniquement dans ce navigateur, jamais partagé.
          <br/><br/>
          Pour créer un token : <b>github.com</b> → Settings → Developer settings → Tokens (classic) → Generate new token → cochez <b>repo</b>.

          autoFocus
        />
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => tok.startsWith("ghp_") && onConfirm(tok)} disabled={!tok.startsWith("ghp_")}
            style={{ flex: 1, padding: "11px", borderRadius: 10, border: "none", background: tok.startsWith("ghp_") ? "linear-gradient(135deg,#1a3a1a,#2d5a27)" : "#ccc", color: "#fff", fontWeight: 800, fontSize: 14, cursor: tok.startsWith("ghp_") ? "pointer" : "not-allowed", fontFamily: "sans-serif" }}>
            ✓ Enregistrer
          </button>
          <button onClick={onClose} style={{ padding: "11px 16px", borderRadius: 10, border: "1px solid #ddd", background: "#fff", color: "#555", fontWeight: 600, cursor: "pointer", fontFamily: "sans-serif" }}>Annuler</button>
        </div>

            🗑 Supprimer le token enregistré
          </button>
        )}
      </div>
    </div>
  );
}

// ── Modal Impression PDF ──
function PrintModal({ records, onClose }) {
  const today = new Date().toISOString().split("T")[0];
  const firstDay = records.length > 0 ? records.map(r => r.dateDebut).sort()[0] : today;
  const [du, setDu] = useState(firstDay);
  const [au, setAu] = useState(today);

  const filtered = records.filter(r => r.dateDebut >= du && r.dateDebut <= au).sort((a,b) => a.dateDebut.localeCompare(b.dateDebut));

  const doPrint = () => {
    const w = window.open("", "_blank");
    w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Carnet Sanitaire</title>
    <style>
      body { font-family: Arial, sans-serif; font-size: 11px; margin: 20px; color: #111; }
      h1 { font-size: 16px; color: #1a3a1a; border-bottom: 2px solid #1a3a1a; padding-bottom: 6px; }
      .period { font-size: 12px; color: #555; margin-bottom: 14px; }
      table { width: 100%; border-collapse: collapse; margin-top: 10px; }
      th { background: #1a3a1a; color: #fff; padding: 6px 8px; text-align: left; font-size: 10px; }
      td { padding: 5px 8px; border-bottom: 1px solid #ddd; vertical-align: top; }
      tr:nth-child(even) { background: #f5faf5; }
      .badge-ok { color: #2d5a27; font-weight: bold; }
      .badge-wait { color: #b85c00; font-weight: bold; }
      @media print { body { margin: 10px; } }
    </style></head><body>
    <h1>🐄 Carnet Sanitaire Bovin Lait</h1>
    <div class="period">Période : du ${du.split("-").reverse().join("/")} au ${au.split("-").reverse().join("/")} — ${filtered.length} traitement(s)</div>
    <table>
      <thead><tr>
        <th>Date</th><th>Vache</th><th>N° travail</th><th>Médicament</th><th>Raison</th>
        <th>Posologie</th><th>Voie</th><th>Att. Lait</th><th>Att. Viande</th><th>Intervenant</th><th>Ord.</th>
      </tr></thead>
      <tbody>${filtered.map(r => {
        const finL = r.joursAttenteL ? addDays(r.dateDebut, r.joursAttenteL) : "";
        const finV = r.joursAttenteV ? addDays(r.dateDebut, r.joursAttenteV) : "";
        const now = today;
        const okL = !finL || finL <= now;
        const okV = !finV || finV <= now;
        return `<tr>
          <td>${r.dateDebut ? r.dateDebut.split("-").reverse().join("/") : "—"}</td>
          <td><b>${r.nomVache||"—"}</b></td>
          <td>${r.travailVache||"—"}</td>
          <td>${r.medicament||"—"}</td>
          <td>${r.raison||"—"}</td>
          <td>${r.posologie||"—"}</td>
          <td>${r.voieAdmin||"—"}</td>
          <td class="${okL?"badge-ok":"badge-wait"}">${finL ? finL.split("-").reverse().join("/") + (okL?" ✓":" ⚠") : "—"}</td>

// ── Zone photo ordonnance : bouton fichier/caméra (mobile + desktop) ──
function PhotoDropZone({ onImage }) {
  const inputRef = useRef(null);
  const cameraRef = useRef(null);
  const [error, setError] = useState("");

  const processFile = (file) => {
    if (!file || !file.type.startsWith("image/")) {
      setError("Fichier non reconnu. Utilisez une image JPG ou PNG.");
      return;
    }
    setError("");
    const reader = new FileReader();
    reader.onload = ev => onImage(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleChange = (e) => {
    const file = e.target.files[0];
    processFile(file);
    e.target.value = "";
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {/* Bouton galerie / fichier */}
      <input ref={inputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleChange} />
      <button type="button" onClick={() => inputRef.current?.click()}
        style={{ width: "100%", padding: "16px", borderRadius: 10, border: "2px dashed #b8d8b8", background: "#f7fbf7", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 8 }}>
        <span style={{ fontSize: 36 }}>🖼️</span>
        <span style={{ fontFamily: "sans-serif", fontSize: 14, fontWeight: 700, color: "#2d5a27" }}>Choisir une photo</span>
        <span style={{ fontFamily: "sans-serif", fontSize: 12, color: "#7a9a7a" }}>Galerie photos ou fichier</span>
      </button>
      {/* Bouton appareil photo direct */}
      <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={handleChange} />
      <button type="button" onClick={() => cameraRef.current?.click()}
        style={{ width: "100%", padding: "13px", borderRadius: 10, border: "2px solid #d4e8d4", background: "#e8f5e9", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
        <span style={{ fontSize: 24 }}>📷</span>
        <span style={{ fontFamily: "sans-serif", fontSize: 14, fontWeight: 700, color: "#1a3a1a" }}>Prendre une photo</span>
      </button>
      {error && <div style={{ color: "#c62828", fontSize: 12, fontFamily: "sans-serif", fontWeight: 600 }}>{error}</div>}
    </div>
  );
}

    m.nom.toLowerCase().includes(query.toLowerCase()) ||
    m.categorie.toLowerCase().includes(query.toLowerCase())
  );

    cat,
    items: filtered.filter(m => m.categorie === cat)
  })).filter(g => g.items.length > 0);

  const med = MEDICAMENTS.find(m => m.nom === value);

  const select = (m) => { onSelect(m); setOpen(false); setQuery(""); };

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const bg = type === "success" ? "#2d5a27" : type === "loading" ? "#1565c0" : "#c62828";
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 999, background: bg, color: "#fff", borderRadius: 12, padding: "14px 20px", fontFamily: "sans-serif", fontSize: 14, fontWeight: 600, boxShadow: "0 4px 24px #0003", display: "flex", alignItems: "center", gap: 10, maxWidth: 340 }}>
      <span>{type === "loading" ? "⏳" : type === "success" ? "✓" : "✕"}</span>
      <span>{msg}</span>
    </div>
  );
}

function App() {
  const [records, setRecords] = useState([]);
