      padding:9px 16px;font-weight:800;font-size:13px;cursor:pointer;font-family:sans-serif;white-space:nowrap}

  <script>
    const manifestData = {
      name:"Carnet Sanitaire Bovin Lait",short_name:"Carnet Sanitaire",
      description:"Registre des traitements vétérinaires bovins",
      start_url:"./",display:"standalone",
      background_color:"#f0f4f0",theme_color:"#1a3a1a",orientation:"portrait",
      icons:[
        {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' fill='%231a3a1a' rx='32'/><text y='130' x='20' font-size='130'>🐄</text></svg>",sizes:"192x192",type:"image/svg+xml"},
        {src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' fill='%231a3a1a' rx='80'/><text y='380' x='40' font-size='380'>🐄</text></svg>",sizes:"512x512",type:"image/svg+xml"}
      ]
    };
    const blob=new Blob([JSON.stringify(manifestData)],{type:'application/manifest+json'});
    const manifestURL=URL.createObjectURL(blob);
    const link=document.createElement('link');
    link.rel='manifest';link.href=manifestURL;
    document.head.appendChild(link);
  </script>
</head>

<div id="root"></div>

<div id="install-banner">
  <div class="icon">🐄</div>
  <div class="text">
    <strong>Installer l'application</strong>
    <span>Accès rapide depuis l'écran d'accueil</span>
  </div>
  <button id="install-btn">Installer</button>
  <button id="dismiss-btn">✕</button>
</div>

<script>
if('serviceWorker' in navigator){
  const swCode=`
    const CACHE='carnet-sanitaire-v1';
    self.addEventListener('install',e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(['./',]))));
    self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match('./'))))); 
  `;
  const swBlob=new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{});
}
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  document.getElementById('install-banner').classList.add('show');
});
document.getElementById('install-btn').addEventListener('click',()=>{
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;document.getElementById('install-banner').classList.remove('show');});}
});
document.getElementById('dismiss-btn').addEventListener('click',()=>{
  document.getElementById('install-banner').classList.remove('show');
});
window.addEventListener('appinstalled',()=>{document.getElementById('install-banner').classList.remove('show');});
</script>

function addDays(dateStr, days) {
  if (!dateStr || !days) return "";
  const d = new Date(dateStr);
  d.setDate(d.getDate() + parseInt(days, 10));
  return d.toISOString().split("T")[0];
}

const JOURS_SEMAINE = ["Dimanche", "Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi"];
function formatDateAvecJour(d) {
  if (!d || d === "nan") return "—";
  const [y, m, j] = d.split("-");
  const date = new Date(d);
  const jour = JOURS_SEMAINE[date.getDay()];
  return `${jour} ${j}/${m}/${y}`;
}
function formatDate(d) {
  if (!d || d === "nan") return "—";
  const [y, m, j] = d.split("-");
  return `${j}/${m}/${y}`;
}

// ─── Calcul délai max pour un record multi-traitements ───
function calcDelaisMax(traitements) {
  let maxL = null, maxV = null, maxLjours = 0, maxVjours = 0;
  (traitements || []).forEach(t => {
    const dateRef = t.dateDebut;
    if (!dateRef) return;
    if (t.joursAttenteL) {
      const fin = new Date(addDays(dateRef, t.joursAttenteL));
      if (!maxL || fin > maxL) { maxL = fin; maxLjours = parseInt(t.joursAttenteL); }
    }
    if (t.joursAttenteV) {
      const fin = new Date(addDays(dateRef, t.joursAttenteV));
      if (!maxV || fin > maxV) { maxV = fin; maxVjours = parseInt(t.joursAttenteV); }
    }
  });
  return {
    dateAttenteL: maxL ? maxL.toISOString().split("T")[0] : "",
    dateAttenteV: maxV ? maxV.toISOString().split("T")[0] : "",
    joursAttenteL: maxLjours,
    joursAttenteV: maxVjours,
  };
}

// ─── Compat anciens records (1 traitement → array) ───
function normalizeRecord(r) {
  if (r.traitements) return r;
  const t = emptyTraitement();
  t.medicament = r.medicament || "";
  t.posologie = r.posologie || "";
  t.quantite = r.quantite || "";
  t.voieAdmin = r.voieAdmin || "";
  t.voieAdminAutre = r.voieAdminAutre || "";
  t.joursAttenteL = r.joursAttenteL || "";
  t.momentAttenteL = r.momentAttenteL || "matin";
  t.joursAttenteV = r.joursAttenteV || "";
  t.momentAttenteV = r.momentAttenteV || "matin";
  t.numOrdonnance = r.numOrdonnance || "";
  t.intervenant = r.intervenant || "";
  t.photoOrdonnance = r.photoOrdonnance || "";
  t.dateDebut = r.dateDebut || "";
  t.momentDebut = r.momentDebut || "matin";
  t.dateFin = r.dateFin || "";
  t.momentFin = r.momentFin || "matin";
  return {
    ...r,
    annee: r.annee || (r.dateDebut ? r.dateDebut.split("-")[0] : new Date().getFullYear().toString()),
    traitements: [t],
    raison: r.raison || "",
  };
}

function StatusBadge({ record }) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const { dateAttenteL, dateAttenteV } = calcDelaisMax(record.traitements);
  const dL = dateAttenteL ? new Date(dateAttenteL) : null;
  const dV = dateAttenteV ? new Date(dateAttenteV) : null;
  const ok = (!dL || today > dL) && (!dV || today > dV);
  return ok
    ? <span style={{ background: "#d4edda", color: "#1a5c2a", borderRadius: 20, padding: "3px 12px", fontSize: 11, fontWeight: 700, letterSpacing: 1, whiteSpace: "nowrap" }}>✓ LIBÉRÉ</span>
    : <span style={{ background: "#fff3cd", color: "#7a4f00", borderRadius: 20, padding: "3px 12px", fontSize: 11, fontWeight: 700, letterSpacing: 1, whiteSpace: "nowrap" }}>⚠ EN ATTENTE</span>;
}

// ─── Sélecteur vache ───
function VacheSelector({ value, onChange, vaches }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const liste = vaches || VACHES_DEFAUT;
  const vache = liste.find(v => v.nom === value);
  const filtered = liste.filter(v =>
    v.nom.toLowerCase().includes(query.toLowerCase()) ||
    v.travail.includes(query) || v.numero.includes(query)
  );
  const select = (v) => { onChange(v); setOpen(false); setQuery(""); };
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(o => !o)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a", background: "#f7fbf7", cursor: "pointer", justifyContent: "space-between" }}>
        {vache ? (
          <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
            <span style={{ fontSize: 18 }}>🐄</span>
            <div>
              <div style={{ fontWeight: 800, fontSize: 15 }}>{vache.nom}</div>
              <div style={{ fontSize: 11, color: "#5a7a5a" }}>{vache.numero} · N° travail : {vache.travail}</div>
            </div>
          </div>
        ) : <span style={{ color: "#8aaa8a" }}>Sélectionner une vache…</span>}
        <span style={{ color: "#5a7a5a", fontSize: 12 }}>{open ? "▲" : "▼"}</span>
      </div>
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 999, background: "#fff", borderRadius: 10, border: "2px solid #d4e8d4", boxShadow: "0 8px 32px #0002", maxHeight: 300, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid #e8f0e8" }}>
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)} placeholder="🔍 Rechercher nom, N° travail…"
              style={{ width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #d4e8d4", fontSize: 13, fontFamily: "sans-serif", outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ overflowY: "auto", maxHeight: 240 }}>
            {filtered.length === 0
              ? <div style={{ padding: 16, textAlign: "center", color: "#8aaa8a", fontSize: 13, fontFamily: "sans-serif" }}>Aucune vache trouvée</div>
              : filtered.map(v => (
                <div key={v.numero} onClick={() => select(v)}
                  style={{ padding: "9px 14px", cursor: "pointer", display: "flex", gap: 10, alignItems: "center", borderBottom: "1px solid #f0f7f0", background: v.nom === value ? "#e8f5e9" : "transparent" }}
                  onMouseEnter={e => e.currentTarget.style.background = "#f0f9f0"}
                  onMouseLeave={e => e.currentTarget.style.background = v.nom === value ? "#e8f5e9" : "transparent"}>
                  <span style={{ fontSize: 20 }}>🐄</span>
                  <div>
                    <div style={{ fontWeight: 700, fontSize: 14, fontFamily: "sans-serif", color: "#1a3a1a" }}>{v.nom}</div>
                    <div style={{ fontSize: 11, color: "#7a9a7a", fontFamily: "sans-serif" }}>{v.numero} · N° travail : {v.travail} · Née le {v.naissance}</div>
                  </div>
                </div>
              ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Sélecteur médicament ───
function MedicamentSelector({ value, onSelect }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const categories = [...new Set(MEDICAMENTS.map(m => m.categorie))];
  const filtered = MEDICAMENTS.filter(m =>
    m.nom.toLowerCase().includes(query.toLowerCase()) ||
    m.categorie.toLowerCase().includes(query.toLowerCase())
  );
  const grouped = categories.map(cat => ({ cat, items: filtered.filter(m => m.categorie === cat) })).filter(g => g.items.length > 0);
  const med = MEDICAMENTS.find(m => m.nom === value);
  const select = (m) => { onSelect(m); setOpen(false); setQuery(""); };
  return (
    <div style={{ position: "relative" }}>
      <div onClick={() => setOpen(o => !o)}
        style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "9px 12px", borderRadius: 8, border: "2px solid #d4e8d4", fontSize: 14, fontFamily: "sans-serif", color: value ? "#1a3a1a" : "#8aaa8a", background: "#f7fbf7", cursor: "pointer" }}>
        <span style={{ fontWeight: value ? 700 : 400 }}>{value || "Sélectionner ou saisir un médicament…"}</span>
        <span style={{ fontSize: 11, color: "#5a7a5a" }}>{open ? "▲" : "▼"}</span>
      </div>
      {med && (
        <div style={{ marginTop: 5, display: "flex", gap: 10, fontFamily: "sans-serif", fontSize: 12 }}>
          <span style={{ background: "#e3f2fd", color: "#1565c0", borderRadius: 6, padding: "2px 10px", fontWeight: 700 }}>🥛 Lait : {med.lait}j</span>
          <span style={{ background: "#ffebee", color: "#b71c1c", borderRadius: 6, padding: "2px 10px", fontWeight: 700 }}>🥩 Viande : {med.viande}j</span>
          <span style={{ background: "#f3e5f5", color: "#6a1b9a", borderRadius: 6, padding: "2px 10px" }}>{med.categorie}</span>
        </div>
      )}
      {open && (
        <div style={{ position: "absolute", top: "calc(100% + 4px)", left: 0, right: 0, zIndex: 999, background: "#fff", borderRadius: 10, border: "2px solid #d4e8d4", boxShadow: "0 8px 32px #0003", maxHeight: 340, overflow: "hidden", display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "8px 10px", borderBottom: "1px solid #e8f0e8" }}>
            <input autoFocus value={query} onChange={e => setQuery(e.target.value)}
              placeholder="🔍 Rechercher médicament ou catégorie…"
              style={{ width: "100%", padding: "7px 10px", borderRadius: 6, border: "1px solid #d4e8d4", fontSize: 13, fontFamily: "sans-serif", outline: "none", boxSizing: "border-box" }} />
          </div>
          <div style={{ overflowY: "auto", maxHeight: 280 }}>
            {query && !MEDICAMENTS.find(m => m.nom.toLowerCase() === query.toLowerCase()) && (
              <div onClick={() => { onSelect({ nom: query, lait: "", viande: "" }); setOpen(false); setQuery(""); }}
                style={{ padding: "9px 14px", cursor: "pointer", borderBottom: "2px solid #e8f5e9", background: "#f9fff9", display: "flex", alignItems: "center", gap: 8 }}
                onMouseEnter={e => e.currentTarget.style.background = "#e8f5e9"}
                onMouseLeave={e => e.currentTarget.style.background = "#f9fff9"}>
                <span style={{ fontSize: 16 }}>✏️</span>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13, fontFamily: "sans-serif" }}>Utiliser "{query}"</div>
                  <div style={{ fontSize: 11, color: "#7a9a7a", fontFamily: "sans-serif" }}>Saisie manuelle — délais à renseigner manuellement</div>
                </div>
              </div>
            )}
            {grouped.map(({ cat, items }) => (
              <div key={cat}>
                <div style={{ padding: "6px 14px", fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#8aaa8a", background: "#f7fbf7", borderBottom: "1px solid #eee", fontFamily: "sans-serif" }}>{cat}</div>
                {items.map(m => (
                  <div key={m.nom} onClick={() => select(m)}
                    style={{ padding: "9px 14px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: "1px solid #f0f7f0", background: m.nom === value ? "#e8f5e9" : "transparent" }}
                    onMouseEnter={e => e.currentTarget.style.background = "#f0f9f0"}
                    onMouseLeave={e => e.currentTarget.style.background = m.nom === value ? "#e8f5e9" : "transparent"}>
                    <div style={{ fontWeight: 600, fontSize: 13, fontFamily: "sans-serif", color: "#1a3a1a" }}>{m.nom}</div>
                    <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                      <span style={{ background: "#e3f2fd", color: "#1565c0", borderRadius: 5, padding: "1px 8px", fontSize: 11, fontWeight: 700, fontFamily: "sans-serif" }}>🥛 {m.lait}j</span>
                      <span style={{ background: "#ffebee", color: "#b71c1c", borderRadius: 5, padding: "1px 8px", fontSize: 11, fontWeight: 700, fontFamily: "sans-serif" }}>🥩 {m.viande}j</span>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Zone photo drag&drop ───
function PhotoDropZone({ onImage }) {
  const [dragging, setDragging] = useState(false);
  const [error, setError] = useState("");
  const processFile = (file) => {
    if (!file || !file.type.startsWith("image/")) { setError("Fichier non reconnu."); return; }
    const reader = new FileReader();
    reader.onload = ev => onImage(ev.target.result);
    reader.readAsDataURL(file);
  };
  return (
    <div onDrop={e => { e.preventDefault(); setDragging(false); processFile(e.dataTransfer.files[0]); }}
      onDragOver={e => { e.preventDefault(); setDragging(true); }}
      onDragLeave={() => setDragging(false)}
      onPaste={e => { const items = e.clipboardData?.items; if (!items) return; for (const item of items) { if (item.type.startsWith("image/")) { processFile(item.getAsFile()); return; } } setError("Aucune image dans le presse-papier."); }}
      tabIndex={0}
      style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, padding: "28px 20px", borderRadius: 10, border: `2px dashed ${dragging ? "#2d5a27" : "#b8d8b8"}`, background: dragging ? "#e8f5e9" : "#f7fbf7", outline: "none", cursor: "default" }}>
      <span style={{ fontSize: 40 }}>{dragging ? "📂" : "📄"}</span>
      <div style={{ fontFamily: "sans-serif", fontSize: 14, color: "#3a5a3a", fontWeight: 700 }}>Glissez-déposez la photo ici</div>
      <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#7a9a7a", textAlign: "center", lineHeight: 1.6 }}>ou cliquez ici puis <strong>Ctrl+V</strong> pour coller</div>
      <div style={{ fontSize: 11, color: "#2d5a27", fontWeight: 600, fontFamily: "sans-serif", background: "#e8f5e9", borderRadius: 6, padding: "4px 12px" }}>🤖 L'IA lira l'ordonnance et remplira les champs</div>
      {error && <div style={{ color: "#c62828", fontSize: 12, fontFamily: "sans-serif", fontWeight: 600 }}>{error}</div>}
    </div>
  );
}

// ─── Bloc d'un traitement dans le formulaire ───

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        {/* Début */}

          <label style={labelStyle}>Date début *</label>

            onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />

                <input type="radio" name="momentDebut" value={m} checked={t.momentDebut === m} onChange={handleChange} style={{ accentColor: "#2d5a27" }} />

        </div>
        {/* Fin */}

          <label style={labelStyle}>Date fin</label>
          <input type="date" name="dateFin" value={t.dateFin} onChange={handleChange} style={inputStyle}
            onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
          <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
            {["matin", "soir"].map(m => (
              <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: t.momentFin === m ? 700 : 400, color: t.momentFin === m ? "#1a3a1a" : "#7a9a7a" }}>
                <input type="radio" name="momentFin" value={m} checked={t.momentFin === m} onChange={handleChange} style={{ accentColor: "#2d5a27" }} />
                {m.charAt(0).toUpperCase() + m.slice(1)}
              </label>
            ))}
          </div>
        </div>

        {/* Médicament */}
        <div style={{ gridColumn: "1 / -1" }}>

            onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
        </div>
        <div>
          <label style={labelStyle}>⚖️ Quantité / Dose</label>
          <input type="text" name="quantite" value={t.quantite} onChange={handleChange} placeholder="Ex: 10 ml" style={inputStyle}
            onFocus={e => e.target.style.borderColor = "#2d5a27"} onBlur={e => e.target.style.borderColor = "#d4e8d4"} />
        </div>

        {/* Voie admin */}
        <div style={{ gridColumn: "1 / -1" }}>
          <label style={labelStyle}>💉 Voie d'administration</label>

              { val: "Injectable IM", emoji: "💉" }, { val: "Injectable IV", emoji: "🩸" },
              { val: "Injectable SC", emoji: "🔬" }, { val: "Intramammaire", emoji: "🐄" },
              { val: "Per os (oral)", emoji: "👄" }, { val: "Topique", emoji: "🖐️" },

                style={{ padding: "7px 14px", borderRadius: 20, fontSize: 13, fontFamily: "sans-serif", fontWeight: 600, cursor: "pointer", border: t.voieAdmin === val ? "2px solid #2d5a27" : "2px solid #d4e8d4", background: t.voieAdmin === val ? "#2d5a27" : "#f7fbf7", color: t.voieAdmin === val ? "#fff" : "#3a5a3a" }}>

            onFocus={e => e.target.style.borderColor = "#1565c0"} onBlur={e => e.target.style.borderColor = "#bbdefb"} />
          <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
            {["matin", "soir"].map(m => (
              <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: t.momentAttenteL === m ? 700 : 400, color: t.momentAttenteL === m ? "#1565c0" : "#7a9a7a" }}>
                <input type="radio" name="momentAttenteL" value={m} checked={t.momentAttenteL === m} onChange={handleChange} style={{ accentColor: "#1565c0" }} />

            ))}
          </div>
          {t.joursAttenteL && t.dateDebut && (
            <div style={{ marginTop: 5, fontSize: 12, color: "#1565c0", fontFamily: "sans-serif", fontWeight: 600, background: "#e3f2fd", borderRadius: 6, padding: "4px 10px" }}>
              📅 Fin attente : {formatDateAvecJour(addDays(t.dateDebut, t.joursAttenteL))} — {t.momentAttenteL}

          )}
        </div>

        {/* Délai viande */}
        <div>
          <label style={{ ...labelStyle, color: "#b71c1c" }}>🥩 Délai attente VIANDE (jours)</label>
          <input type="number" name="joursAttenteV" value={t.joursAttenteV} onChange={handleChange} placeholder="Ex: 28" min="0"
            style={{ ...inputStyle, border: "2px solid #ffcdd2", color: "#b71c1c", background: "#fff5f5" }}
            onFocus={e => e.target.style.borderColor = "#b71c1c"} onBlur={e => e.target.style.borderColor = "#ffcdd2"} />
          <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
            {["matin", "soir"].map(m => (
              <label key={m} style={{ display: "flex", alignItems: "center", gap: 5, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13, fontWeight: t.momentAttenteV === m ? 700 : 400, color: t.momentAttenteV === m ? "#b71c1c" : "#7a9a7a" }}>
                <input type="radio" name="momentAttenteV" value={m} checked={t.momentAttenteV === m} onChange={handleChange} style={{ accentColor: "#b71c1c" }} />

              </label>
            ))}
          </div>
          {t.joursAttenteV && t.dateDebut && (
            <div style={{ marginTop: 5, fontSize: 12, color: "#b71c1c", fontFamily: "sans-serif", fontWeight: 600, background: "#ffebee", borderRadius: 6, padding: "4px 10px" }}>
              📅 Fin attente : {formatDateAvecJour(addDays(t.dateDebut, t.joursAttenteV))} — {t.momentAttenteV}

                      { label: "Médicament", val: readResult.fields.medicament },
                      { label: "Posologie", val: readResult.fields.posologie },
                      { label: "Quantité", val: readResult.fields.quantite },
                      { label: "Voie admin.", val: readResult.fields.voieAdmin },
                      { label: "Intervenant", val: readResult.fields.intervenant },
                      { label: "Date début", val: readResult.fields.dateDebut },
                      { label: "N° ordonnance", val: readResult.fields.numOrdonnance },
                      { label: "Attente lait", val: readResult.fields.joursAttenteL ? readResult.fields.joursAttenteL + " j" : "" },
                      { label: "Attente viande", val: readResult.fields.joursAttenteV ? readResult.fields.joursAttenteV + " j" : "" },
                    ].filter(f => f.val).map(({ label, val }) => (
                      <div key={label} style={{ background: "#fff", borderRadius: 6, padding: "5px 9px", fontFamily: "sans-serif" }}>
                        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1.2, textTransform: "uppercase", color: "#5a7a5a" }}>{label}</div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#1a3a1a", marginTop: 1 }}>{val}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={() => onApplyRead(t.id)} style={{ flex: 1, padding: "9px", borderRadius: 8, border: "none", background: "#2d5a27", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13 }}>✓ Appliquer</button>
                    <button onClick={onDismissRead} style={{ padding: "9px 14px", borderRadius: 8, border: "1px solid #a5d6a7", background: "#fff", color: "#2d5a27", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>Ignorer</button>
                  </div>
                </div>
              )}
            </div>
          ) : (
            <PhotoDropZone onImage={dataUrl => onChange(t.id, "photoOrdonnance", dataUrl)} />
          )}
        </div>
      </div>
    </div>
  );
}

function Toast({ msg, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 4000); return () => clearTimeout(t); }, []);
  const bg = type === "success" ? "#2d5a27" : type === "loading" ? "#1565c0" : "#c62828";
  return (
    <div style={{ position: "fixed", bottom: 24, right: 24, zIndex: 999, background: bg, color: "#fff", borderRadius: 12, padding: "14px 20px", fontFamily: "sans-serif", fontSize: 14, fontWeight: 600, boxShadow: "0 4px 24px #0003", display: "flex", alignItems: "center", gap: 10, maxWidth: 340 }}>
      <span>{type === "loading" ? "⏳" : type === "success" ? "✓" : "✕"}</span><span>{msg}</span>
    </div>
  );
}

  const jsonInputRef = useRef(null);

  const handleCSV = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(Boolean);
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.replace(/[="]/g, "").trim().toLowerCase());
      const nomIdx = headers.findIndex(h => h.includes("nom"));
      const numIdx = headers.findIndex(h => h === "n°" || h.startsWith("n°") || h === "numero" || h.includes("national"));
      const travailIdx = headers.findIndex(h => h.includes("travail"));
      const naissIdx = headers.findIndex(h => h.includes("naissance") || h.includes("né"));
      if (nomIdx === -1) { alert("Colonne 'Nom' introuvable."); return; }
      const parsed = lines.slice(1).map(line => {
        const cols = line.split(sep).map(c => c.replace(/[="]/g, "").trim());
        return { nom: (cols[nomIdx] || "").toUpperCase(), numero: numIdx >= 0 ? cols[numIdx] : "", travail: travailIdx >= 0 ? cols[travailIdx] : "", naissance: naissIdx >= 0 ? cols[naissIdx] : "" };
      }).filter(v => v.nom && v.nom !== "NAN" && v.nom.length > 1);
      onImportVaches(parsed); onClose();
    };
    reader.readAsText(file, "latin-1");
    e.target.value = "";
  };

  const handleJSON = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (data.records) { onImportSauvegarde(data.records); onClose(); }
        else alert("Format de sauvegarde invalide.");
      } catch { alert("Fichier JSON invalide."); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const downloadJSON = () => {
    const blob = new Blob([JSON.stringify({ version: 2, savedAt: new Date().toISOString(), records }, null, 2)], { type: "application/json" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
    a.download = `carnet-sanitaire-${new Date().toISOString().slice(0,10)}.json`; a.click();
  };
  const downloadVachesCSV = () => {
    const header = "Nom;Numéro;N° travail;Date naissance";
    const rows = vaches.map(v => `${v.nom};${v.numero};${v.travail};${v.naissance}`);
    const blob = new Blob([header + "\n" + rows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "troupeau.csv"; a.click();
  };

  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex" }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0, background: "#0006" }} />
      <div style={{ position: "relative", width: 320, background: "#fff", height: "100%", boxShadow: "4px 0 32px #0003", display: "flex", flexDirection: "column", overflowY: "auto" }}>
        <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", padding: "20px 20px 16px", flexShrink: 0 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ color: "#fff", fontSize: 18, fontWeight: 900 }}>⚙️ Menu</div>
            <button onClick={onClose} style={{ background: "#ffffff22", border: "none", color: "#fff", borderRadius: 8, padding: "5px 10px", cursor: "pointer", fontSize: 17 }}>✕</button>
          </div>
          <div style={{ marginTop: 12, display: "flex", gap: 8 }}>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{vaches.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Vaches</div>
            </div>
            <div style={{ flex: 1, background: "#ffffff18", borderRadius: 8, padding: "8px 10px", textAlign: "center", fontFamily: "sans-serif" }}>
              <div style={{ fontSize: 18, fontWeight: 900, color: "#fff" }}>{records.length}</div>
              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#a8d5a2" }}>Traitements</div>
            </div>
          </div>
        </div>
        <div style={{ padding: 16, flex: 1 }}>
          {/* Troupeau */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>🐄 Troupeau</div>
            <div style={{ background: "#f7fbf7", borderRadius: 10, padding: "10px 12px", marginBottom: 10, maxHeight: 160, overflowY: "auto" }}>
              {vaches.map(v => (
                <div key={v.numero || v.nom} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0", borderBottom: "1px solid #eef4ee", fontFamily: "sans-serif" }}>
                  <span style={{ fontWeight: 700, fontSize: 13, color: "#1a3a1a" }}>🐄 {v.nom}</span>
                  <span style={{ fontSize: 11, color: "#7a9a7a" }}>{v.travail}</span>
                </div>
              ))}
            </div>
            <input ref={csvInputRef} type="file" accept=".csv,.txt" style={{ display: "none" }} onChange={handleCSV} />
            <button onClick={() => csvInputRef.current?.click()} style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #2d5a27", background: "#fff", color: "#2d5a27", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📥 Importer troupeau (CSV Boviclic)</button>
            <button onClick={downloadVachesCSV} style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #d4e8d4", background: "#f7fbf7", color: "#3a5a3a", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📤 Exporter troupeau (CSV)</button>
          </div>
          {/* Sauvegarde */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>💾 Sauvegarde locale</div>
            <input ref={jsonInputRef} type="file" accept=".json" style={{ display: "none" }} onChange={handleJSON} />
            <button onClick={() => jsonInputRef.current?.click()} style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #1565c0", background: "#fff", color: "#1565c0", fontWeight: 700, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📥 Importer sauvegarde (JSON)</button>
            <button onClick={downloadJSON} style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #bbdefb", background: "#f3f8ff", color: "#1565c0", fontWeight: 600, fontSize: 13, cursor: "pointer", fontFamily: "sans-serif" }}>📤 Exporter sauvegarde (JSON)</button>
          </div>
          {/* GitHub Backup */}
          <div style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, textTransform: "uppercase", color: "#5a7a5a", fontFamily: "sans-serif", marginBottom: 10, paddingBottom: 6, borderBottom: "1px solid #e8f0e8" }}>
              ☁️ Sauvegarde GitHub
            </div>
            {!githubToken || showTokenInput ? (
              <div style={{ background: "#f7fbf7", borderRadius: 10, padding: 12, marginBottom: 8 }}>
                <div style={{ fontFamily: "sans-serif", fontSize: 12, color: "#3a5a3a", marginBottom: 8, fontWeight: 600 }}>
                  Token GitHub (accès repo)
                </div>
                <input
                  id="gh-token-input"
                  type="password"
                  defaultValue={githubToken}
                  placeholder="ghp_xxxxxxxxxxxx"
                  style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: "1px solid #c8e6c9", fontSize: 13, fontFamily: "sans-serif", boxSizing: "border-box", marginBottom: 8 }}
                />
                <button onClick={() => {
                  const val = document.getElementById("gh-token-input").value.trim();
                  if (val) { onSaveToken(val); setShowTokenInput(false); }
                }} style={{ width: "100%", padding: "8px", borderRadius: 7, border: "none", background: "#2d5a27", color: "#fff", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif", fontSize: 13 }}>
                  Enregistrer le token
                </button>
                <div style={{ marginTop: 8, fontSize: 11, color: "#8aaa8a", fontFamily: "sans-serif", lineHeight: 1.5 }}>
                  Créez un token sur <strong>github.com → Settings → Developer settings → Personal access tokens → Fine-grained</strong> avec accès en écriture au repo <strong>carnet-sanitaire</strong>.
                </div>
              </div>
            ) : (
              <div style={{ marginBottom: 8, display: "flex", alignItems: "center", justifyContent: "space-between", fontFamily: "sans-serif", fontSize: 12, color: "#2d5a27", background: "#e8f5e9", borderRadius: 7, padding: "6px 10px" }}>
                <span>✓ Token configuré</span>
                <button onClick={() => setShowTokenInput(true)} style={{ background: "none", border: "none", color: "#5a7a5a", cursor: "pointer", fontSize: 11, fontFamily: "sans-serif" }}>Modifier</button>
              </div>
            )}
            <button onClick={() => { onDriveSave(); onClose(); }} disabled={driveLoading}
              style={{ width: "100%", marginBottom: 8, padding: "10px 14px", borderRadius: 9, border: "2px solid #2d5a27", background: "#fff", color: "#2d5a27", fontWeight: 700, fontSize: 13, cursor: driveLoading ? "wait" : "pointer", fontFamily: "sans-serif" }}>
              {driveLoading ? "⏳ En cours…" : "☁️ Sauvegarder sur GitHub"}
            </button>
            <button onClick={() => { onDriveRestore(); onClose(); }} disabled={driveLoading}
              style={{ width: "100%", padding: "10px 14px", borderRadius: 9, border: "1px solid #c8e6c9", background: "#f7fbf7", color: "#2d5a27", fontWeight: 600, fontSize: 13, cursor: driveLoading ? "wait" : "pointer", fontFamily: "sans-serif" }}>
              ⬇️ Restaurer depuis GitHub
            </button>
            <div style={{ marginTop: 8, fontSize: 11, color: "#8aaa8a", fontFamily: "sans-serif" }}>
              Fichier : {GITHUB_OWNER}/{GITHUB_REPO}/{GITHUB_FILE}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// App principale
// ══════════════════════════════════════════════
function App() {
  const [records, setRecords] = useState([]);
  const [vaches, setVaches] = useState(VACHES_DEFAUT);
  const [showMenu, setShowMenu] = useState(false);
  const [form, setForm] = useState(emptyForm);
  const [showForm, setShowForm] = useState(false);
  const [editId, setEditId] = useState(null);
  const [search, setSearch] = useState("");
  const [filterAnnee, setFilterAnnee] = useState("");
  const [detailId, setDetailId] = useState(null);
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [toast, setToast] = useState(null);
  const [driveLoading, setDriveLoading] = useState(false);
  const [githubToken, setGithubToken] = useState(() => localStorage.getItem("gh_token") || "");
  const [showTokenInput, setShowTokenInput] = useState(false);
  const [lightbox, setLightbox] = useState(null);
  const [showAlertes, setShowAlertes] = useState(false);
  const [notifPermission, setNotifPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "denied");
  const [readingId, setReadingId] = useState(null);
  const [readResult, setReadResult] = useState(null);
  const notifiedRef = useRef(new Set());
  const isFirstRender = useRef(true);

  const showToast = (msg, type = "success") => setToast({ msg, type });

  // Années disponibles pour filtre
  const anneesDispos = useMemo(() => {
    const anneeActuelle = new Date().getFullYear();
    const s = new Set(records.map(r => r.annee || (r.traitements?.[0]?.dateDebut || "").split("-")[0]).filter(Boolean));
    s.add(String(anneeActuelle));
    return [...s].sort((a,b) => b-a);
  }, [records]);

  const filtered = useMemo(() => {
    let rs = records.map(normalizeRecord);
    if (filterAnnee) rs = rs.filter(r => r.annee === filterAnnee || (r.traitements?.[0]?.dateDebut || "").startsWith(filterAnnee));
    if (search) rs = rs.filter(r =>
      r.nomVache?.toLowerCase().includes(search.toLowerCase()) ||
      r.raison?.toLowerCase().includes(search.toLowerCase()) ||
      r.traitements?.some(t =>
        t.medicament?.toLowerCase().includes(search.toLowerCase()) ||
        t.intervenant?.toLowerCase().includes(search.toLowerCase())
      )
    );
    return rs;
  }, [records, search, filterAnnee]);

  // ─ Formulaire traitements
  const updateTraitement = (tid, field, value) => {
    setForm(f => ({ ...f, traitements: f.traitements.map(t => t.id === tid ? { ...t, [field]: value } : t) }));
  };
  const addTraitement = () => {
    setForm(f => ({ ...f, traitements: [...f.traitements, emptyTraitement()] }));
  };
  const removeTraitement = (tid) => {
    setForm(f => ({ ...f, traitements: f.traitements.filter(t => t.id !== tid) }));
  };

  // ─ Lecture ordonnance IA
  const handleReadOrdonnance = async (t) => {
    if (!t.photoOrdonnance) return;
    setReadingId(t.id);
    setReadResult(null);
    try {
      const base64 = t.photoOrdonnance.split(",")[1];
      const mediaType = t.photoOrdonnance.split(";")[0].split(":")[1];
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514", max_tokens: 1000,
          system: `Tu es un assistant vétérinaire expert en ordonnances bovines françaises.
Analyse cette ordonnance et extrait les informations en JSON uniquement, sans texte avant ou après :
{"medicament":"","raison":"","posologie":"","quantite":"","voieAdmin":"Injectable IM|Injectable IV|Injectable SC|Intramammaire|Per os (oral)|Topique|Pour-on|Autre","dateDebut":"YYYY-MM-DD","dateFin":"YYYY-MM-DD","joursAttenteL":"","joursAttenteV":"","numOrdonnance":"","intervenant":"","notes":""}
Réponds UNIQUEMENT avec le JSON.`,
          messages: [{ role: "user", content: [
            { type: "image", source: { type: "base64", media_type: mediaType, data: base64 } },
            { type: "text", text: "Extrais les informations de cette ordonnance." }
          ]}]
        })
      });
      const data = await res.json();
      const text = data.content?.filter(b => b.type === "text").map(b => b.text).join("") || "";
      const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
      const medMatch = MEDICAMENTS.find(m => parsed.medicament && m.nom.toLowerCase().includes(parsed.medicament.toLowerCase().split(" ")[0]));
      setReadResult({
        success: true, tid: t.id, notes: parsed.notes,
        fields: {
          medicament: parsed.medicament || "", raison: parsed.raison || "",
          posologie: parsed.posologie || "", quantite: parsed.quantite || "",
          voieAdmin: parsed.voieAdmin || "",
          dateDebut: parsed.dateDebut || "", dateFin: parsed.dateFin || "",
          joursAttenteL: parsed.joursAttenteL || (medMatch ? String(medMatch.lait) : ""),
          joursAttenteV: parsed.joursAttenteV || (medMatch ? String(medMatch.viande) : ""),
          numOrdonnance: parsed.numOrdonnance || "", intervenant: parsed.intervenant || "",
        }
      });
    } catch (e) {
      setReadResult({ success: false, tid: t.id, error: e.message });
    } finally {
      setReadingId(null);
    }
  };

  const applyReadResult = (tid) => {
    if (!readResult?.fields) return;
    const f = readResult.fields;
    setForm(fm => ({
      ...fm,
      raison: fm.raison || f.raison || "",
      traitements: fm.traitements.map(t => t.id === tid ? { ...t, ...f } : t)
    }));
    setReadResult(null);
    showToast("✓ Champs remplis depuis l'ordonnance");
  };

  const handleSubmit = () => {
    if (!form.nomVache || !form.traitements.some(t => t.dateDebut)) return;
    const annee = form.annee || (form.traitements.find(t => t.dateDebut)?.dateDebut || "").split("-")[0] || new Date().getFullYear().toString();
    const rec = { ...form, id: editId ?? Date.now(), annee };
    if (editId !== null) setRecords(rs => rs.map(r => r.id === editId ? rec : r));
    else setRecords(rs => [...rs, rec]);
    setEditId(null); setForm(emptyForm); setShowForm(false);
    showToast(editId ? "✓ Traitement modifié" : "✓ Traitement enregistré");
  };

  const handleEdit = record => { setForm({ ...normalizeRecord(record) }); setEditId(record.id); setShowForm(true); setDetailId(null); };
  const handleDelete = id => { setRecords(rs => rs.filter(r => r.id !== id)); setConfirmDelete(null); setDetailId(null); };

  // ─ Sauvegarde GitHub
  const ghHeaders = (token) => ({
    "Content-Type": "application/json",
    "Authorization": `Bearer ${token}`,
    "Accept": "application/vnd.github+json",
  });

  const saveToGitHub = async (currentRecords) => {
    if (!githubToken) { setShowTokenInput(true); return; }
    setDriveLoading(true); showToast("Sauvegarde en cours…", "loading");
    try {
      const payload = JSON.stringify({ version: 2, savedAt: new Date().toISOString(), records: currentRecords ?? records }, null, 2);
      const content = btoa(unescape(encodeURIComponent(payload)));
      const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
      // Récupérer le sha existant si le fichier existe déjà
      let sha;
      const existing = await fetch(url, { headers: ghHeaders(githubToken) });
      if (existing.ok) { const d = await existing.json(); sha = d.sha; }
      const body = { message: "Sauvegarde carnet sanitaire", content, ...(sha ? { sha } : {}) };
      const res = await fetch(url, { method: "PUT", headers: ghHeaders(githubToken), body: JSON.stringify(body) });
      if (!res.ok) throw new Error((await res.json()).message || res.statusText);
      showToast("✓ Sauvegardé sur GitHub", "success");
    } catch (e) { showToast("Erreur sauvegarde : " + e.message, "error"); }
    finally { setDriveLoading(false); }
  };

  const restoreFromGitHub = async () => {
    if (!githubToken) { setShowTokenInput(true); return; }
    setDriveLoading(true); showToast("Restauration en cours…", "loading");
    try {
      const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
      const res = await fetch(url, { headers: ghHeaders(githubToken) });
      if (!res.ok) throw new Error("Fichier introuvable sur GitHub");
      const d = await res.json();
      const text = decodeURIComponent(escape(atob(d.content.replace(/\n/g, ""))));
      const parsed = JSON.parse(text);
      if (parsed.records) { setRecords(parsed.records.map(normalizeRecord)); showToast(`✓ ${parsed.records.length} traitement(s) restauré(s)`, "success"); }
      else showToast("Format non reconnu", "error");
    } catch (e) { showToast("Erreur restauration : " + e.message, "error"); }
    finally { setDriveLoading(false); }
  };

  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    if (records.length === 0) return;
    const t = setTimeout(() => saveToGitHub(records), 2000);
    return () => clearTimeout(t);
  }, [records]);

  // ─ Alertes délais
  const alertes = useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const result = [];
    records.map(normalizeRecord).forEach(r => {
      const { dateAttenteL, dateAttenteV } = calcDelaisMax(r.traitements);
      const momL = r.traitements?.reduce((acc, t) => { if (t.joursAttenteL) return t.momentAttenteL; return acc; }, "matin");
      const momV = r.traitements?.reduce((acc, t) => { if (t.joursAttenteV) return t.momentAttenteV; return acc; }, "matin");
      [
        { d: dateAttenteL, type: "LAIT", icon: "🥛", color: "#1565c0", moment: momL },
        { d: dateAttenteV, type: "VIANDE", icon: "🥩", color: "#b71c1c", moment: momV },
      ].forEach(({ d, type, icon, color, moment }) => {
        if (!d) return;
        const date = new Date(d); date.setHours(0,0,0,0);
        const diff = Math.round((date - today) / 86400000);
        if (diff <= 3 && diff >= 0)
          result.push({ id: r.id, vache: r.nomVache, type, icon, color, moment, quand: diff === 0 ? "aujourd'hui" : diff === 1 ? "demain" : `dans ${diff} j`, urgence: diff === 0 ? "high" : diff === 1 ? "med" : "low", date: d, diff });
      });
    });
    return result.sort((a,b) => a.diff - b.diff || a.vache?.localeCompare(b.vache));
  }, [records]);

  useEffect(() => {
    if (notifPermission !== "granted") return;
    alertes.forEach(a => {
      const key = `${a.id}-${a.type}-${a.date}`;
      if (notifiedRef.current.has(key)) return;
      if (a.urgence === "high" || a.urgence === "med") {
        new Notification(a.urgence === "high" ? `🚨 Délai ${a.type} expire AUJOURD'HUI` : `⚠️ Délai ${a.type} expire DEMAIN`, {
          body: `🐄 ${a.vache} — Fin d'attente ${a.type} : ${formatDateAvecJour(a.date)} ${a.moment}`,
          icon: "https://cdn.jsdelivr.net/npm/twemoji@14/assets/72x72/1f404.png", tag: key,
        });
        notifiedRef.current.add(key);
      }
    });
  }, [alertes, notifPermission]);

  const detail = records.map(normalizeRecord).find(r => r.id === detailId);

  return (
    <div style={{ minHeight: "100vh", background: "#f0f4f0", fontFamily: "'Georgia','Times New Roman',serif" }}>
      {toast && <Toast msg={toast.msg} type={toast.type} onClose={() => setToast(null)} />}

      <MenuPanel open={showMenu} onClose={() => setShowMenu(false)} vaches={vaches} records={records}
        driveLoading={driveLoading} onDriveSave={() => saveToGitHub(records)} onDriveRestore={restoreFromGitHub}
        githubToken={githubToken} onSaveToken={t => { setGithubToken(t); localStorage.setItem("gh_token", t); }}
        showTokenInput={showTokenInput} setShowTokenInput={setShowTokenInput}
        onImportVaches={nv => { setVaches(nv.sort((a,b) => a.nom.localeCompare(b.nom))); showToast(`✓ ${nv.length} vaches importées`); }}
        onImportSauvegarde={nr => { setRecords(nr.map(normalizeRecord)); showToast(`✓ ${nr.length} traitements restaurés`); }} />

      {/* PANEL ALERTES */}
      {showAlertes && (
        <div style={{ position: "fixed", top: 0, right: 0, bottom: 0, zIndex: 150, display: "flex", flexDirection: "column" }}>
          <div onClick={() => setShowAlertes(false)} style={{ position: "fixed", inset: 0, background: "#0004", zIndex: -1 }} />
          <div style={{ marginLeft: "auto", width: 340, height: "100%", background: "#fff", boxShadow: "-4px 0 32px #0003", display: "flex", flexDirection: "column", overflowY: "auto" }}>
            <div style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", padding: "18px 20px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
              <h3 style={{ margin: 0, color: "#fff", fontSize: 17, fontWeight: 900 }}>🔔 Alertes délais</h3>

              <h3 style={{ margin: "0 0 8px", color: "#1a3a1a", fontWeight: 900 }}>Confirmer la suppression</h3>
              <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 16 }}>
                <button onClick={() => setConfirmDelete(null)} style={{ padding: "8px 16px", borderRadius: 8, border: "2px solid #ddd", background: "#fff", color: "#333", fontWeight: 700, cursor: "pointer", fontFamily: "sans-serif" }}>Annuler</button>
                <button onClick={() => handleDelete(confirmDelete)} style={{ padding: "8px 16px", borderRadius: 8, border: "none", background: "#c62828", color: "#fff", fontWeight: 800, cursor: "pointer", fontFamily: "sans-serif" }}>Supprimer</button>
              </div>
            </div>
          </div>
        )}

        {/* TABLE */}
        {filtered.length === 0 ? (
          <div style={{ textAlign: "center", padding: "52px 24px", color: "#5a7a5a" }}>
            <div style={{ fontSize: 52, marginBottom: 12 }}>🐄</div>
            <div style={{ fontSize: 17, fontWeight: 700, color: "#2d5a27", marginBottom: 6 }}>
              {records.length === 0 ? "Aucun traitement enregistré" : "Aucun résultat trouvé"}
            </div>
            <div style={{ fontSize: 13, fontFamily: "sans-serif", color: "#7a9a7a" }}>
              {records.length === 0 ? 'Cliquez sur "+ Nouveau traitement" pour commencer' : "Essayez un autre terme ou année"}
            </div>
          </div>
        ) : (
          <div style={{ overflowX: "auto", borderRadius: 14, boxShadow: "0 2px 20px #0001", background: "#fff" }}>
            <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "sans-serif" }}>
              <thead>
                <tr style={{ background: "linear-gradient(135deg,#1a3a1a,#2d5a27)", color: "#fff" }}>
                  {["Vache", "N° travail", "Année", "Raison", "Traitements", "Délai Lait max", "Délai Viande max", "Statut", ""].map(h => (
                    <th key={h} style={{ padding: "10px 11px", textAlign: "left", fontSize: 9, letterSpacing: 1.5, textTransform: "uppercase", fontWeight: 700, whiteSpace: "nowrap" }}>{h}</th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {filtered.map((r, i) => {
                  const { dateAttenteL, dateAttenteV, joursAttenteL, joursAttenteV } = calcDelaisMax(r.traitements);
                  return (
                    <tr key={r.id} onClick={() => setDetailId(r.id)}
                      style={{ background: i % 2 === 0 ? "#fff" : "#f7fbf7", cursor: "pointer" }}
                      onMouseEnter={e => e.currentTarget.style.background = "#e8f5e9"}
                      onMouseLeave={e => e.currentTarget.style.background = i % 2 === 0 ? "#fff" : "#f7fbf7"}>
                      <td style={{ padding: "9px 11px", fontWeight: 800, color: "#1a3a1a", whiteSpace: "nowrap" }}>🐄 {r.nomVache}</td>
                      <td style={{ padding: "9px 11px", color: "#2d5a27", fontWeight: 600 }}>{r.travailVache || "—"}</td>
                      <td style={{ padding: "9px 11px", color: "#5a7a5a", fontWeight: 600 }}>
                        <span style={{ background: "#e8f5e9", color: "#1a3a1a", borderRadius: 6, padding: "2px 8px", fontSize: 12, fontWeight: 700 }}>{r.annee || "—"}</span>
                      </td>
                      <td style={{ padding: "9px 11px", color: "#555" }}>{r.raison || "—"}</td>
                      <td style={{ padding: "9px 11px" }}>
                        <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                          {(r.traitements || []).map((t, j) => (
                            <span key={j} style={{ background: "#f0f7f0", color: "#1a3a1a", borderRadius: 5, padding: "2px 8px", fontSize: 11, fontWeight: 600, display: "block" }}>
                              {t.medicament || "—"}
                              {t.voieAdmin && <span style={{ color: "#7a9a7a", marginLeft: 5 }}>· {t.voieAdmin}</span>}
                            </span>
                          ))}
                        </div>
                        {r.traitements.length > 1 && (
                          <div style={{ fontSize: 10, color: "#8aaa8a", marginTop: 3 }}>{r.traitements.length} traitements</div>
                        )}
                      </td>
                      <td style={{ padding: "9px 11px", color: "#1565c0", fontWeight: 700, whiteSpace: "nowrap", fontSize: 12 }}>
                        {dateAttenteL ? <>{joursAttenteL}j<br/><span style={{ fontWeight: 400 }}>{formatDate(dateAttenteL)}</span></> : "—"}
                      </td>
                      <td style={{ padding: "9px 11px", color: "#b71c1c", fontWeight: 700, whiteSpace: "nowrap", fontSize: 12 }}>
                        {dateAttenteV ? <>{joursAttenteV}j<br/><span style={{ fontWeight: 400 }}>{formatDate(dateAttenteV)}</span></> : "—"}
                      </td>
                      <td style={{ padding: "9px 11px" }}><StatusBadge record={r} /></td>
                      <td style={{ padding: "9px 7px" }}>
                        <div style={{ display: "flex", gap: 4 }}>
                          <button onClick={e => { e.stopPropagation(); handleEdit(r); }} style={{ padding: "3px 8px", borderRadius: 6, border: "1px solid #c8e6c9", background: "#f1f8e9", color: "#2d5a27", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>✎</button>
                          <button onClick={e => { e.stopPropagation(); setConfirmDelete(r.id); }} style={{ padding: "3px 8px", borderRadius: 6, border: "1px solid #ffcdd2", background: "#fff8f8", color: "#c62828", cursor: "pointer", fontWeight: 700, fontSize: 12 }}>🗑</button>
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}

        <div style={{ marginTop: 24, textAlign: "center", color: "#8aaa8a", fontSize: 10, fontFamily: "sans-serif", letterSpacing: 1 }}>
          CARNET SANITAIRE BOVIN LAIT — Conforme réglementation française — {vaches.length} animaux
        </div>
      </div>
    </div>
  );
}

const { useState, useMemo, useRef, useEffect } = React;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
